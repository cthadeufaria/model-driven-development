decisions:
  flag: "--force overwrites all regenerable files (docs, skills, entrypoint blocks, hook) without prompting; no-flag init keeps today's per-file [o/S] prompt; the three state files are exempt from --force"
  migration: "round-trip re-serialize, forward-only: a state file is migrated only when its on-disk version < current schema version (parse into current struct so fields added since fill from defaults, bump version, write back); equal version is left untouched (idempotent, preserves curated trace.yml comments); never downgrades a newer file"
notes: "New current-side concept family (init-scaffold: 7 @ids across use-cases/sequences/domain/components) folded into the whole-map. Parity verified: mdd validate PASSED, mdd review PASSED (ID + security + traceability, base e0820b5). Reverse traceability shows only bucket-A glue warnings (the impl_state_file! macro + comments). Full workspace test suite green (87 core incl. 5 new migration tests, 22 CLI incl. 2 new --force tests). The conflict handler is never passed to the state-file path, so --force cannot reach config/trace/approvals."
