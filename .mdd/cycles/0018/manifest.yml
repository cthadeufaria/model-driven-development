number: 0018
slug: init-force-overwrite-state-migration
entry: generate
description: "mdd init must have the flag to overwrite all except trace, config and approvals. Those last three must be updated for newer versions without being overwritten."
status: closed
opened_at: "2026-05-24T15:03:50Z"
closed_at: "2026-05-24T15:22:07Z"
