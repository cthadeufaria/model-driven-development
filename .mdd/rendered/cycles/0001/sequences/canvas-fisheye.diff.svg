.8457" y="124.5117">egui painter</text></g><g class="participant participant-tail" data-entity-uid="part5" data-qualified-name="Painter" data-source-line="40" id="part5-tail"><rect fill="#E2E2F0" height="30.4883" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="95.7373" x="980.8457" y="654.3652"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="81.7373" x="987.8457" y="674.9004">egui painter</text></g><g class="message" data-entity-1="part1" data-entity-2="part2" data-source-line="42" id="msg1"><polygon fill="#181818" points="316.4702,162.7754,326.4702,166.7754,316.4702,170.7754,320.4702,166.7754" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="57.1592" x2="322.4702" y1="166.7754" y2="166.7754"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.311" x="64.1592" y="162.0332">scroll wheel over canvas (resp.hovered)</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" data-source-line="43" id="msg2"><polygon fill="#181818" points="623.6836,192.0859,633.6836,196.0859,623.6836,200.0859,627.6836,196.0859" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="328.4702" x2="629.6836" y1="196.0859" y2="196.0859"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="283.2134" x="335.4702" y="191.3438">base_zoom *= factor at cursor; pan adjusted</text></g><g class="message" data-entity-1="part1" data-entity-2="part2" data-source-line="44" id="msg3"><polygon fill="#181818" points="316.4702,221.3965,326.4702,225.3965,316.4702,229.3965,320.4702,225.3965" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="57.1592" x2="322.4702" y1="225.3965" y2="225.3965"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="171.7104" x="64.1592" y="220.6543">drag canvas (resp.dragged)</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" data-source-line="45" id="msg4"><polygon fill="#181818" points="623.6836,250.707,633.6836,254.707,623.6836,258.707,627.6836,254.707" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="328.4702" x2="629.6836" y1="254.707" y2="254.707"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="118.8345" x="335.4702" y="249.9648">pan += drag_delta</text></g><path d="M640,267.707 L640,353.707 L1002,353.707 L1002,277.707 L992,267.707 L640,267.707" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M992,267.707 L992,277.707 L1002,277.707 L992,267.707" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="313.4727" x="646" y="285.2754">No Reset / Zoom +/- buttons (svg_toolbar shows</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="279.8047" x="646" y="300.5859">only the PAGE selector + a hint). Focal is the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="341.3706" x="646" y="315.8965">canvas-rect centre (CanvasView::focal); fisheye_radius</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="325.0952" x="646" y="331.207">is set each frame to the farthest-corner distance so</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.6714" x="646" y="346.5176">corners stay fixed (OCL-FISHEYE-FOCAL-CENTER).</text><path d="M10,366.2598 L84.4468,366.2598 L84.4468,373.5703 L74.4468,383.5703 L10,383.5703 L10,366.2598" fill="#EEEEEE" style="stroke:#000000;stroke-width:1.5;"/><rect fill="none" height="272.1055" style="stroke:#000000;stroke-width:1.5;" width="1076.583" x="10" y="366.2598"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="29.4468" x="25" y="379.8281">loop</text><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="700" lengthAdjust="spacing" textLength="117.2832" x="99.4468" y="378.8945">[each painted frame]</text><g class="message" data-entity-1="part2" data-entity-2="part4" data-source-line="55" id="msg5"><polygon fill="#181818" points="886.5181,400.8809,896.5181,404.8809,886.5181,408.8809,890.5181,404.8809" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="328.4702" x2="892.5181" y1="404.8809" y2="404.8809"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="248.6758" x="335.4702" y="400.1387">rebuild texture at base_zoom if needed</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" data-source-line="56" id="msg6"><polygon fill="#181818" points="623.6836,430.1914,633.6836,434.1914,623.6836,438.1914,627.6836,434.1914" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="328.4702" x2="629.6836" y1="434.1914" y2="434.1914"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="221.7109" x="335.4702" y="429.4492">fisheye_mesh(tex, draw_rect, focal)</text></g><g class="message" data-entity-1="part3" data-entity-2="part3" data-source-line="57" id="msg7"><line style="stroke:#181818;stroke-width:1;" x1="635.6836" x2="677.6836" y1="463.502" y2="463.502"/><line style="stroke:#181818;stroke-width:1;" x1="677.6836" x2="677.6836" y1="463.502" y2="476.502"/><line style="stroke:#181818;stroke-width:1;" x1="636.6836" x2="677.6836" y1="476.502" y2="476.502"/><polygon fill="#181818" points="646.6836,472.502,636.6836,476.502,646.6836,480.502,642.6836,476.502" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="248.8345" x="642.6836" y="458.7598">warp() each grid vertex (56x56) radially</text></g><path d="M640,489.502 L640,544.502 L999,544.502 L999,499.502 L989,489.502 L640,489.502" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M989,489.502 L989,499.502 L999,499.502 L989,489.502" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="338.9775" x="646" y="507.0703">warp: nd = dist/radius; f = (1-s)*nd + s*sin(nd*PI/2);</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.4199" x="646" y="522.3809">pos = focal + v * (radius * f / d). Centre magnifies,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="331.1572" x="646" y="537.6914">edges compress. UVs unchanged so text stays crisp.</text><g class="message" data-entity-1="part3" data-entity-2="part2" data-source-line="63" id="msg8"><polygon fill="#181818" points="339.4702,567.7441,329.4702,571.7441,339.4702,575.7441,335.4702,571.7441" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="333.4702" x2="634.6836" y1="571.7441" y2="571.7441"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="91" x="345.4702" y="567.002">textured Mesh</text></g><g class="message" data-entity-1="part2" data-entity-2="part5" data-source-line="64" id="msg9"><polygon fill="#181818" points="1016.7144,597.0547,1026.7144,601.0547,1016.7144,605.0547,1020.7144,601.0547" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="328.4702" x2="1022.7144" y1="601.0547" y2="601.0547"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="316.8179" x="335.4702" y="596.3125">painter.add(Shape::mesh(mesh)) clipped to canvas</text></g><g class="message" data-entity-1="part5" data-entity-2="p