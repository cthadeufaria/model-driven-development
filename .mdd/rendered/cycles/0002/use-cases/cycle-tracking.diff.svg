<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="627px" preserveAspectRatio="none" style="width:1289px;height:627px;background:#FFFFFF;" version="1.1" viewBox="0 0 1289 627" width="1289px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="48"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="299.8311" x="491.3384" y="23.5352">MDD cycle tracking &#8212; use cases (current)</text></g><!--cluster mdd toolchain + viewer--><g class="cluster" data-qualified-name="mdd toolchain . viewer" data-source-line="54" id="ent0003"><rect fill="none" height="194" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="1114.02" x="147.08" y="358.7283"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="171.5479" x="618.3161" y="374.2634">mdd toolchain + viewer</text></g><!--entity RunCycle--><g class="entity" data-qualified-name="mdd toolchain . viewer.RunCycle" data-source-line="55" id="ent0004"><ellipse cx="284.718" cy="419.7281" fill="#F1F1F1" rx="103.388" ry="26.2198" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="140.1436" x="214.6462" y="416.0889">Run a full MDD cycle</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="142.5703" x="213.4328" y="432.5772">from one description</text></g><!--entity Tree--><g class="entity" data-qualified-name="mdd toolchain . viewer.Tree" data-source-line="56" id="ent0005"><ellipse cx="714.7594" cy="509.7322" fill="#F1F1F1" rx="121.4194" ry="26.6839" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="131.3252" x="649.0968" y="503.011">Browse models in a</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="196.1914" x="616.6637" y="519.4993">directory tree (VSCode-style)</text></g><!--entity Group--><g class="entity" data-qualified-name="mdd toolchain . viewer.Group" data-source-line="57" id="ent0006"><ellipse cx="1133.9514" cy="425.7286" fill="#F1F1F1" rx="96.5014" ry="21.7003" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="167.8496" x="1050.0266" y="430.4727">Group diagrams by cycle</text></g><!--entity Diff--><g class="entity" data-qualified-name="mdd toolchain . viewer.Diff" data-source-line="58" id="ent0007"><ellipse cx="284.7164" cy="507.7256" fill="#F1F1F1" rx="121.6364" ry="26.7273" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="153.9863" x="207.7232" y="502.6621">View the selected file's</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="184.4541" x="192.4893" y="519.1504">before/after diff for a cycle</text></g><!--entity DiffDiagram--><g class="entity" data-qualified-name="mdd toolchain . viewer.DiffDiagram" data-source-line="59" id="ent0008"><ellipse cx="714.7616" cy="420.7266" fill="#F1F1F1" rx="124.8416" ry="27.3683" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.8545" x="640.8344" y="414.3447">Toggle diff between a</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="202.1592" x="613.6821" y="430.8329">rendered diagram and the list</text></g><!--entity Desc--><g class="entity" data-qualified-name="mdd toolchain . viewer.Desc" data-source-line="60" id="ent0009"><ellipse cx="1133.9518" cy="506.7266" fill="#F1F1F1" rx="111.1418" ry="24.6284" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="174.8496" x="1046.527" y="506.9846">Read a diagram element's</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="76.0771" x="1095.9132" y="523.4728">description</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="52" id="ent0002"><ellipse cx="40.1592" cy="546.2266" fill="#90EE90" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M40.1592,554.2266 L40.1592,581.2266 M27.1592,562.2266 L53.1592,562.2266 M40.1592,581.2266 L27.1592,596.2266 M40.1592,581.2266 L53.1592,596.2266" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="68.3184" x="6" y="611.2617">Developer</text><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="56.6357" x="11.8413" y="534.7734">&#171;added&#187;</text></g><g class="entity" data-qualified-name="GMN18" data-source-line="74" id="ent0019"><path d="M559.37,43.4883 L559.37,175.9727 L870.1532,175.9727 L870.1532,53.4883 L860.1532,43.4883 L559.37,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M860.1532,43.4883 L860.1532,53.4883 L870.1532,53.4883 L860.1532,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="266.9316" x="565.37" y="61.0566">Code: the /mdd-cycle skill is registered in</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="289.7832" x="565.37" y="76.3672">templates::WORKFLOW_SKILLS and shipped as</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.564" x="565.37" y="91.6777">SKILL.md to .claude/ and .codex/. Entry</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="260.6157" x="565.37" y="106.9883">selection, cycle-boundary ownership, the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="273.7109" x="565.37" y="122.2988">parity loop, and the mandatory clarification</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="279.9126" x="565.37" y="137.6094">pause are documented there. The close step</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="223.4121" x="565.37" y="152.9199">also rasterizes the cycle diff pumls.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="186.437" x="565.37" y="168.2305">Realized by SEQ-RUN-CYCLE.</text></g><g class="entity" data-qualified-name="GMN21" data-source-line="85" id="ent0022"><path d="M135.32,256.4583 L135.32,343.011 L434.1188,343.011 L434.1188,266.4583 L424.1188,256.4583 L135.32,256.4583" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M424.1188,256.4583 L424.1188,266.4583 L434.1188,266.4583 L424.1188,256.4583" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="213.9668" x="141.32" y="274.0266">Code: MddViewer::diff_ui resolves</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237.0024" x="141.32" y="289.3372">(self.selected_cycle, self.selected_file)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256.6802" x="141.32" y="304.6477">to that file's CycleDiff; an unchanged file</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="277.7988" x="141.32" y="319.9583">or open cycle shows a placeholder. Realized</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="187.2749" x="141.32" y="335.2688">by SEQ-RENDER-CYCLE-DIFF.</text></g><g class="entity" data-qualified-name="GMN24" data-source-line="93" id="ent0025"><path d="M555.12,210.4883 L555.12,342.9727 A0,0 0 0 0 555.12,342.9727 L710.76,342.9727 L714.76,392.8883 L718.76,342.9727 L874.4027,342.9727 A0,0 0 0 0 874.4027,342.9727 L874.4027,220.4883 L864.4027,210.4883 L555.12,210.4883 A0,0 0 0 0 555.12,210.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M864.4027,210.4883 L864.4027,220.4883 L874.4027,220.4883 L864.4027,210.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.709" x="561.12" y="228.0566">Code: DiffSubMode toggle in diff_ui.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.7778" x="561.12" y="243.3672">Diagram resolves Cycle::diff_puml_rel -&gt;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.457" x="561.12" y="258.6777">Project::rendered_svg_path, loads it via</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256.6294" x="561.12" y="273.9883">DiagramPage::load and paints it with the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="257.0039" x="561.12" y="289.2988">shared paint_canvas (pan/zoom reused);</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="218.7085" x="561.12" y="304.6094">List renders that one file's element</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="246.3589" x="561.12" y="319.9199">buckets. The .diff.svg is pre-rasterized</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="298.2827" x="561.12" y="335.2305">by render_cycle_diffs (SEQ-RENDER-DIFF-SVG).</text></g><g class="entity" data-qualified-name="GMN27" data-source-line="104" id="ent0028"><path d="M993.4,271.1083 L993.4,342.3505 L1274.5079,342.3505 L1274.5079,281.1083 L1264.5079,271.1083 L993.4,271.1083" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1264.5079,271.1083 L1264.5079,281.1083 L1274.5079,281.1083 L1264.5079,271.1083" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="231.918" x="999.4" y="288.6766">Code: @desc(&lt;ID&gt;, "text") parsed by</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="260.1079" x="999.4" y="303.9872">extract_descs into Project::descriptions();</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="201.5952" x="999.4" y="319.2977">shown on selection. Realized by</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="133.1738" x="999.4" y="334.6083">SEQ-ELEMENT-DESC.</text></g><!--link Dev to RunCycle--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="63" id="lnk10"><path d="M74.24,520.8783 C90.57,500.7583 111.82,478.5183 135.32,463.7283 C155.22,451.2083 173.09,443.7884 195.58,437.2284" fill="none" id="Dev-to-RunCycle" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="201.34,435.5483,191.58,434.2284,196.54,436.9484,193.8201,441.9084,201.34,435.5483" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Tree--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="64" id="lnk11"><path d="M74.62,567.5883 C142.54,567.0283 301.4,564.3583 434.12,551.7283 C496.06,545.8383 559.3006,536.4586 613.3406,527.5086" fill="none" id="Dev-to-Tree" style="stroke:#181818;stroke-width:1;"/><polygon fill=