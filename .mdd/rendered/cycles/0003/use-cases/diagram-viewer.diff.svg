<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="950px" preserveAspectRatio="none" style="width:1068px;height:950px;background:#FFFFFF;" version="1.1" viewBox="0 0 1068 950" width="1068px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="39"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="272.3369" x="394.6646" y="23.5352">mdd view &#8212; diagram viewer (current)</text></g><!--cluster mdd-viewer--><g class="cluster" data-qualified-name="mdd-viewer" data-source-line="45" id="ent0003"><rect fill="none" height="336" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="774.4" x="219.95" y="373.4283"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="88.7783" x="562.7608" y="388.9634">mdd-viewer</text></g><!--entity View--><g class="entity" data-qualified-name="mdd-viewer.View" data-source-line="46" id="ent0004"><ellipse cx="359.2449" cy="483.4273" fill="#F1F1F1" rx="119.7449" ry="26.349" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="157.6641" x="280.4128" y="479.1936">View rendered diagram</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="172.3271" x="273.0813" y="495.6819">(shapes AND text legible)</text></g><!--entity Browse--><g class="entity" data-qualified-name="mdd-viewer.Browse" data-source-line="47" id="ent0005"><ellipse cx="864.7131" cy="675.4289" fill="#F1F1F1" rx="78.9031" ry="18.1806" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="127.4697" x="800.9782" y="680.173">Browse model files</text></g><!--entity PanZoom--><g class="entity" data-qualified-name="mdd-viewer.PanZoom" data-source-line="48" id="ent0006"><ellipse cx="864.7144" cy="511.4245" fill="#F1F1F1" rx="112.8544" ry="25.9162" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="146.6787" x="791.375" y="507.3513">Pan and zoom canvas</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="158.0811" x="785.6739" y="523.8396">(scroll zoom, drag pan)</text></g><!--entity Fisheye--><g class="entity" data-qualified-name="mdd-viewer.Fisheye" data-source-line="49" id="ent0007"><ellipse cx="864.714" cy="429.4251" fill="#F1F1F1" rx="93.784" ry="21.1568" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="161.7725" x="783.8277" y="434.1692">Focus via center fisheye</text></g><!--entity Panels--><g class="entity" data-qualified-name="mdd-viewer.Panels" data-source-line="50" id="ent0008"><ellipse cx="864.7143" cy="597.4271" fill="#F1F1F1" rx="113.6443" ry="25.1289" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="205.3584" x="762.0351" y="602.1713">Collapse / expand side panels</text></g><!--entity Trace--><g class="entity" data-qualified-name="mdd-viewer.Trace" data-source-line="51" id="ent0009"><ellipse cx="359.2382" cy="573.4259" fill="#F1F1F1" rx="123.2882" ry="27.0576" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="226.0098" x="246.2333" y="578.1701">Inspect model IDs and trace links</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="43" id="ent0002"><ellipse cx="54.8592" cy="659.6783" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M54.8592,667.6783 L54.8592,694.6783 M41.8592,675.6783 L67.8592,675.6783 M54.8592,694.6783 L41.8592,709.6783 M54.8592,694.6783 L67.8592,709.6783" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="68.3184" x="20.7" y="724.7134">Developer</text></g><g class="entity" data-qualified-name="GMN20" data-source-line="67" id="ent0021"><path d="M675.75,43.4883 L675.75,145.3516 L1053.666,145.3516 L1053.666,53.4883 L1043.666,43.4883 L675.75,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1043.666,43.4883 L1043.666,53.4883 L1053.666,53.4883 L1043.666,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="316.6338" x="681.75" y="61.0566">Code (USE-FISHEYE-FOCUS): the canvas paints the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="342.1387" x="681.75" y="76.3672">rendered texture through a center-fixed fisheye mesh</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="356.916" x="681.75" y="91.6777">(CanvasView::fisheye_mesh / warp) &#8212; the centre bulges,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="354.3262" x="681.75" y="106.9883">content compresses toward the edges, corners stay put.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="346.9375" x="681.75" y="122.2988">Layered on the scroll-at-cursor base zoom; drag pans.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="221.0381" x="681.75" y="137.6094">Realized by SEQ-CANVAS-FISHEYE.</text></g><g class="entity" data-qualified-name="GMN23" data-source-line="76" id="ent0024"><path d="M685.08,180.4583 L685.08,236.3899 L1044.3276,236.3899 L1044.3276,190.4583 L1034.3276,180.4583 L685.08,180.4583" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1034.3276,180.4583 L1034.3276,190.4583 L1044.3276,190.4583 L1034.3276,180.4583" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="338.2476" x="691.08" y="198.0266">The toolbar has no Reset / Zoom + / Zoom - buttons</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="325.0127" x="691.08" y="213.3372">(removed). Zoom is scroll-only at the cursor; pan is</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.2715" x="691.08" y="228.6477">drag-only. A small hint label replaces the buttons.</text></g><g class="entity" data-qualified-name="GMN26" data-source-line="82" id="ent0027"><path d="M677.47,271.1483 L677.47,357.701 L1051.9456,357.701 L1051.9456,281.1483 L1041.9456,271.1483 L677.47,271.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1041.9456,271.1483 L1041.9456,281.1483 L1051.9456,281.1483 L1041.9456,271.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="353.4756" x="683.47" y="288.7166">Code (USE-TOGGLE-PANELS): each SidePanel renders an</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.0942" x="683.47" y="304.0272">inner-edge chevron; clicking it sets PanelLayout</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="316.8813" x="683.47" y="319.3377">collapsed and the panel shrinks to an exact-width</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="319.3696" x="683.47" y="334.6483">sliver button that re-expands on click. Realized by</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="146.1992" x="683.47" y="349.9588">SEQ-PANEL-COLLAPSE.</text></g><g class="entity" data-qualified-name="GMN29" data-source-line="90" id="ent0030"><path d="M163.73,271.1483 L163.73,357.701 A0,0 0 0 0 163.73,357.701 L355.24,357.701 L359.24,456.6883 L363.24,357.701 L554.7539,357.701 A0,0 0 0 0 554.7539,357.701 L554.7539,281.1483 L544.7539,271.1483 L163.73,271.1483 A0,0 0 0 0 163.73,271.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M544.7539,271.1483 L544.7539,281.1483 L554.7539,281.1483 L544.7539,271.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="340.6787" x="169.73" y="288.7166">Reads pre-rendered SVGs from .mdd/rendered/. If no</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="329.4561" x="169.73" y="304.0272">models are mapped/rendered the canvas shows "No</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="297.5718" x="169.73" y="319.3377">rendered output". Text rendering is realized by</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="370.0239" x="169.73" y="334.6483">SEQ-RENDER-DIAGRAM-PAGE, which consults a populated</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="367.1548" x="169.73" y="349.9588">font database (DOM-FONT-DATABASE) before rasterizing.</text></g><!--entity RemovedByCycle0--><g class="entity" data-qualified-name="RemovedByCycle0" data-source-line="96" id="ent0032"><rect fill="#F1F1F1" height="38.9766" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="95.7256" x="7" y="576.9383"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="73.7256" x="18" y="593.4734">&#171;removed&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="41.0771" x="34.3242" y="609.9617">Graph</text></g><!--link Dev to View--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="54" id="lnk10"><path d="M89.52,650.9383 C94.11,645.1883 98.65,639.2383 102.73,633.4283 C133.71,589.2383 120.31,560.4783 163.73,528.4283 C187.85,510.6183 212.0195,501.0391 241.2095,494.3991" fill="none" id="Dev-to-View" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="247.06,493.0683,237.397,491.1642,242.1845,494.1773,239.1714,498.9649,247.06,493.0683" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Browse--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="55" id="lnk11"><path d="M66.64,728.0683 C77.64,759.4083 98.13,801.5283 132.73,821.4283 C330.4,935.0683 427.6,887.7383 645.75,821.4283 C729.42,795.9883 805.8119,730.6917 840.9719,697.5817" fill="none" id="Dev-to-Browse" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="845.34,693.4683,836.0456,696.7263,841.6999,696.8961,841.5302,702.5504,845.34,693.4683" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to PanZoom--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="56" id="lnk12"><path d="M89.2,701.4583 C187.14,734.4683 477.58,815.3483 645.75,680.4283 C690.65,644.3983 634.87,594.9483 675.75,554.4283 C696.43,533.9183 718.9121,523.6861 747.3021,517.3961" fill="none" id="Dev-to-PanZoom" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="753.16,516.0983,743.5078,514.1398,748.2784,517.1798,745.2383,521.9504,753.16,516.0983" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Fisheye--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="57" id="lnk13"><path d="M89.49,688.4983 C208.47,684.9183 604.6,670.2283 645.75,632.4283 C700.31