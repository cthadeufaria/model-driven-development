gthAdjust="spacing" textLength="167.5762" x="825.41" y="110.5134">loaded : Option&lt;String&gt;</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="816.41" cy="123.2107" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="98.3828" x="825.41" y="127.0017">source : String</text><line style="stroke:#181818;stroke-width:0.5;" x1="806.41" x2="997.9862" y1="133.9548" y2="133.9548"/></g><g class="entity" data-qualified-name="GMN9" data-source-line="48" id="ent0010"><path d="M452.71,444.2383 L452.71,515.4805 A0,0 0 0 0 452.71,515.4805 L757.6978,515.4805 A0,0 0 0 0 757.6978,515.4805 L757.6978,454.2383 L747.6978,444.2383 L609.2,444.2383 L605.2,358.1783 L601.2,444.2383 L452.71,444.2383 A0,0 0 0 0 452.71,444.2383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M747.6978,444.2383 L747.6978,454.2383 L757.6978,454.2383 L747.6978,444.2383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="283.9878" x="458.71" y="461.8066">Backed by usvg::fontdb::Database. Built once</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="267.1475" x="458.71" y="477.1172">in shared_fontdb() (static OnceLock), filled</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="283.9878" x="458.71" y="492.4277">by load_system_fonts(), then Arc-cloned into</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256.4834" x="458.71" y="507.7383">usvg::Options.fontdb at every parse site.</text></g><g class="entity" data-qualified-name="GMN12" data-source-line="55" id="ent0013"><path d="M158.42,258.4083 L158.42,360.2716 A0,0 0 0 0 158.42,360.2716 L473.9766,360.2716 A0,0 0 0 0 473.9766,360.2716 L473.9766,268.4083 L463.9766,258.4083 L289.71,258.4083 L225.36,158.7183 L281.71,258.4083 L158.42,258.4083 A0,0 0 0 0 158.42,258.4083" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M463.9766,258.4083 L463.9766,268.4083 L473.9766,268.4083 L463.9766,258.4083" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="269.8706" x="164.42" y="275.9766">MddViewer::ocl_ui: Source paints `source`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="294.5566" x="164.42" y="291.2872">(read-only, @id/context/inv colored); Diagram</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="261.5806" x="164.42" y="306.5977">loads Project::rendered_svg_path(.ocl) via</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.2285" x="164.42" y="321.9083">DiagramPage and paints it with paint_canvas,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="292.8999" x="164.42" y="337.2188">else a placeholder (OCL-OCL-VIEW-SUBMODE,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="241.0205" x="164.42" y="352.5294">OCL-OCL-DIAGRAM-NEEDS-RENDER).</text></g><g class="entity" data-qualified-name="GMN15" data-source-line="64" id="ent0016"><path d="M736.06,235.4383 L736.06,383.2332 A0,0 0 0 0 736.06,383.2332 L1068.3491,383.2332 A0,0 0 0 0 1068.3491,383.2332 L1068.3491,245.4383 L1058.3491,235.4383 L906.2,235.4383 L902.2,142.1583 L898.2,235.4383 L736.06,235.4383 A0,0 0 0 0 736.06,235.4383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1058.3491,235.4383 L1058.3491,245.4383 L1068.3491,245.4383 L1058.3491,235.4383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="298.3589" x="742.06" y="253.0066">Added cycle 0012 (DOM-PUML-SOURCE-VIEW).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="282.3818" x="742.06" y="268.3172">MddViewer::source_ui (View::Source branch):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="244.6895" x="742.06" y="283.6277">reads the selected model file once into</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="295.1343" x="742.06" y="298.9383">`source` (cached by `loaded`) and paints it in</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="300.2886" x="742.06" y="314.2488">egui::ScrollArea::both as read-only monospace,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="291.9985" x="742.06" y="329.5594">highlighting `' @` markers, `@start`/`@end`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="311.2891" x="742.06" y="344.8699">directives and `'` comments. No DiagramPage or</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272.9238" x="742.06" y="360.1805">rasterizer call, so it needs no rendered SVG</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="222.9487" x="742.06" y="375.491">(OCL-PUML-SOURCE-NO-RENDER).</text></g><!--reverse link SvgRasterizer to FontDatabase--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="aggregation" data-source-line="44" id="lnk7"><path codeLine="44" d="M605.2,154.1583 C605.2,187.9283 605.2,224.5183 605.2,260.4483" fill="none" id="SvgRasterizer-backto-FontDatabase" style="stroke:#181818;stroke-width:1;"/><polygon fill="none" points="605.2,142.1583,601.2,148.1583,605.2,154.1583,609.2,148.1583,605.2,142.1583" style="stroke:#181818;stroke-wid