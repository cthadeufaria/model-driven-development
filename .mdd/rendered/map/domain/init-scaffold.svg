="38" id="ent0008"><path d="M537.29,235.4383 L537.29,352.6121 A0,0 0 0 0 537.29,352.6121 L951.0068,352.6121 A0,0 0 0 0 951.0068,352.6121 L951.0068,245.4383 L941.0068,235.4383 L660.16,235.4383 L539.51,158.0983 L652.16,235.4383 L537.29,235.4383 A0,0 0 0 0 537.29,235.4383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M941.0068,235.4383 L941.0068,245.4383 L951.0068,245.4383 L941.0068,235.4383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="261.2188" x="543.29" y="253.0066">migrate() (write_yaml_create_or_migrate):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.1743" x="551.5166" y="268.3172">onDiskVersion &lt; schemaVersion -&gt; Migrated</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="236.8184" x="559.7431" y="283.6277">(parse into current struct, defaults fill</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.8091" x="563.8564" y="298.9383">new fields, bump version, write back)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="361.2451" x="551.5166" y="314.2488">onDiskVersion = schemaVersion -&gt; Skipped (untouched)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="384.4902" x="551.5166" y="329.5594">onDiskVersion &gt; schemaVersion -&gt; Skipped (no downgrade)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="305.5635" x="543.29" y="344.8699">Preserves all prior content; no per-version code.</text></g><g class="entity" data-qualified-name="GMN10" data-source-line="48" id="ent0011"><path d="M6,413.6183 L6,546.1027 A0,0 0 0 0 6,546.1027 L428.2925,546.1027 A0,0 0 0 0 428.2925,546.1027 L428.2925,423.6183 L418.2925,413.6183 L22