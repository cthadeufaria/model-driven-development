engthAdjust="spacing" textLength="81.7373" x="987.8457" y="658.4121">egui painter</text></g><g class="message" data-entity-1="part1" data-entity-2="part2" data-source-line="16" id="msg1"><polygon fill="#181818" points="316.4702,146.2871,326.4702,150.2871,316.4702,154.2871,320.4702,150.2871" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="57.1592" x2="322.4702" y1="150.2871" y2="150.2871"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.311" x="64.1592" y="145.5449">scroll wheel over canvas (resp.hovered)</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" data-source-line="17" id="msg2"><polygon fill="#181818" points="623.6836,175.5977,633.6836,179.5977,623.6836,183.5977,627.6836,179.5977" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="328.4702" x2="629.6836" y1="179.5977" y2="179.5977"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="283.2134" x="335.4702" y="174.8555">base_zoom *= factor at cursor; pan adjusted</text></g><g class="message" data-entity-1="part1" data-entity-2="part2" data-source-line="18" id="msg3"><polygon fill="#181818" points="316.4702,204.9082,326.4702,208.9082,316.4702,212.9082,320.4702,208.9082" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="57.1592" x2="322.4702" y1="208.9082" y2="208.9082"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="171.7104" x="64.1592" y="204.166">drag canvas (resp.dragged)</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" data-source-line="19" id="msg4"><polygon fill="#181818" points="623.6836,234.2188,633.6836,238.2188,623.6836,242.2188,627.6836,238.2188" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="328.4702" x2="629.6836" y1="238.2188" y2="238.2188"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="118.8345" x="335.4702" y="233.4766">pan += drag_delta</text></g><path d="M640,251.2188 L640,337.2188 L1002,337.2188 L1002,261.2188 L992,251.2188 L640,251.2188" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M992,251.2188 L992,261.2188 L1002,261.2188 L992,251.2188" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="313.4727" x="646" y="268.7871">No Reset / Zoom +/- buttons (svg_toolbar shows</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="279.8047" x="646" y="284.0977">only the PAGE selector + a hint). Focal is the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="341.3706" x="646" y="299.4082">canvas-rect centre (CanvasView::focal); fisheye_radius</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="325.0952" x="646" y="314.7188">is set each frame to the farthest-corner distance so</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.6714" x="646" y="330.0293">corners stay fixed (OCL-FISHEYE-FOCAL-CENTER).</text><path d="M10,349.7715 L84.4468,349.7715 L84.4468,357.082 L74.4468,367.082 L10,367.082 L10,349.7715" fill="#EEEEEE" style="stroke:#000000;stroke-width:1.5;"/><rect fill="none" height="272.1055" style="stroke:#000000;stroke-width:1.5;" width="1076.583" x="10" y="349.7715"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="29.4468" x="25" y="363.3398">loop</text><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="700" lengthAdjust="spacing" textLength="117.2832" x="99.4468" y="362.4063">[each painted frame]</text><g class="message" data-entity-1="part2" data-entity-2="part4" data-source-line="29" id="msg5"><polygon fill="#181818" points="886.5181,384.3926,896.5181,388.3926,886.5181,392.3926,890.5181,388.3926" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="328.4702" x2="892.5181" y1="388.3926" y2="388.3926"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="248.6758" x="335.4702" y="383.6504">rebuild texture at base_zoom if needed</text></g><g class="message" data-entity-1="part2" data-entity-2="part3" data-source-line="30" id="msg6"><polygon fill="#181818" points="623.6836,413.7031,633.6836,417.7031,623.6836,421.7031,627.6836,417.7031" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="328.4702" x2="629.6836" y1="417.7031" y2="417.7031"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="221.7109" x="335.4702" y="412.9609">fisheye_mesh(tex, draw_rect, focal)</text></g><g class="message" data-entity-1="part3" data-entity-2="part3" data-source-line="31" id="msg7"><line style="stroke:#181818;stroke-width:1;" x1="635.6836" x2="677.6836" y1="447.0137" y2="447.0137"/><line style="stroke:#181818;stroke-width:1;" x1="677.6836" x2="677.6836" y1="447.0137" y2="460.0137"/><line style="stroke:#181818;stroke-width:1;" x1="636.6836" x2="677.6836" y1="460.0137" y2="460.0137"/><polygon fill="#181818" points="646.6836,456.0137,636.6836,460.0137,646.6836,464.0137,642.6836,460.0137" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="248.8345" x="642.6836" y="442.2715">warp() each grid vertex (56x56) radially</text></g><path d="M640,473.0137 L640,528.0137 L999,528.0137 L999,483.0137 L989,473.0137 L640,473.0137" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M989,473.0137 L989,483.0137 L999,483.0137 L989,473.0137" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="338.9775" x="646" y="490.582">warp: nd = dist/radius; f = (1-s)*nd + s*sin(nd*PI/2);</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.4199" x="646" y="505.8926">pos = focal + v * (radius * f / d). Centre magnifies,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="331.1572" x="646" y="521.2031">edges compress. UVs unchanged so text stays crisp.</text><g class="message" data-entity-1="part3" data-entity-2="part2" data-source-line="37" id="msg8"><polygon fill="#181818" points="339.4702,551.2559,329.4702,555.2559,339.4702,559.2559,335.4702,555.2559" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="333.4702" x2="634.6836" y1="555.2559" y2="555.2559"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="91" x="345.4702" y="550.5137">textured Mesh</text></g><g class="message" data-entity-1="part2" data-entity-2="part5" data-source-line="38" id="msg9"><polygon fill="#181818" points="1016.7144,580.5664,1026.7144,584.5664,1016.7144,588.5664,1020.7144,584.5664" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="328.4702" x2="1022.7144" y1="584.5664" y2="584.5664"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="316.8179" x="335.4702" y="579.8242">painter.add(Shape::mesh(mesh)) clipped to canvas</text></g><g class="message" data-entity-1="part5" data-entity-2="part1" data-source-line="39" id="msg10"><polygon fill="#181818" points="68.1592,609.877,58.1592,613.877,68.1592,617.877,64.1592,613.877" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="62.1592" x2="1027.7144" y1="613.877" y2="613.877"/><text fill="#000000" font-family="sans-serif" f