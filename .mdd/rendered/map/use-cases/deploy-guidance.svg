<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="759px" preserveAspectRatio="none" style="width:989px;height:759px;background:#FFFFFF;" version="1.1" viewBox="0 0 989 759" width="989px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="22"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="417.334" x="282.413" y="23.5352">/mdd-deploy deployment guidance &#8212; use cases (current)</text></g><!--cluster mdd toolchain (utility, outside the parity gate)--><g class="cluster" data-qualified-name="mdd toolchain .utility. outside the parity gate." data-source-line="28" id="ent0003"><rect fill="none" height="329" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="842.83" x="132.33" y="343.4483"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="333.1768" x="387.1566" y="358.9834">mdd toolchain (utility, outside the parity gate)</text></g><!--entity Guide--><g class="entity" data-qualified-name="mdd toolchain .utility. outside the parity gate..Guide" data-source-line="29" id="ent0004"><ellipse cx="298.7757" cy="452.449" fill="#F1F1F1" rx="150.4457" ry="37.0607" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="214.1289" x="191.7113" y="442.0185">Guide an Azure Container Apps</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="180.5029" x="208.5243" y="458.5068">deployment via a diagram,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.0254" x="203.763" y="474.9951">runbook, and generated IaC</text></g><!--entity Inspect--><g class="entity" data-qualified-name="mdd toolchain .utility. outside the parity gate..Inspect" data-source-line="30" id="ent0005"><ellipse cx="775.1048" cy="405.4492" fill="#F1F1F1" rx="122.2048" ry="26.841" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.7861" x="701.2117" y="399.7297">Inspect the generated</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.9961" x="679.6067" y="416.2179">deployment diagram as SVG</text></g><!--entity Purpose--><g class="entity" data-qualified-name="mdd toolchain .utility. outside the parity gate..Purpose" data-source-line="31" id="ent0006"><ellipse cx="775.1019" cy="506.4507" fill="#F1F1F1" rx="184.0619" ry="39.2124" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="230.1934" x="660.0052" y="491.4846">Confirm the deployment PURPOSE</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="206.377" x="671.9134" y="507.9729">(dev/staging/prod) before any</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="291.3135" x="629.4451" y="524.4611">purpose-driven default &#8212; no silent default</text></g><!--entity AccessCheck--><g class="entity" data-qualified-name="mdd toolchain .utility. outside the parity gate..AccessCheck" data-source-line="32" id="ent0007"><ellipse cx="775.1026" cy="618.4448" fill="#F1F1F1" rx="179.0326" ry="38.2065" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="243.1133" x="653.546" y="605.9682">Account for who READS and WRITES</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="273.2803" x="638.4625" y="622.4565">every secured store (identity + admitted</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="257.585" x="646.3102" y="638.9448">path) before emitting &#8212; surface holes</text></g><!--entity Op--><g class="entity" data-qualified-name="Op" data-source-line="26" id="ent0002"><ellipse cx="36.2559" cy="573.7083" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M36.2559,581.7083 L36.2559,608.7083 M23.2559,589.7083 L49.2559,589.7083 M36.2559,608.7083 L23.2559,623.7083 M36.2559,608.7083 L49.2559,623.7083" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="60.5117" x="6" y="638.7434">Operator</text></g><g class="entity" data-qualified-name="GMN15" data-source-line="45" id="ent0016"><path d="M127.51,163.8983 L127.51,327.0037 A0,0 0 0 0 127.51,327.0037 L294.78,327.0037 L298.78,415.2583 L302.78,327.0037 L470.0378,327.0037 A0,0 0 0 0 470.0378,327.0037 L470.0378,173.8983 L460.0378,163.8983 L127.51,163.8983 A0,0 0 0 0 127.51,163.8983" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M460.0378,163.8983 L460.0378,173.8983 L470.0378,173.8983 L460.0378,163.8983" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.1514" x="133.51" y="181.4666">Implemented in templates::MDD_DEPLOY_SKILL:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.3613" x="133.51" y="196.7772">v1 supports only azure-container-apps</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.9517" x="133.51" y="212.0877">(../atlas-ate-server); any other target is</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="294.4741" x="133.51" y="227.3983">rejected. Reads MDD models + the target repo</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="271.6606" x="133.51" y="242.7088">read-only, pauses on ambiguity, writes the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.5278" x="133.51" y="258.0194">deployment diagram + runbook + generated infra,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="300.9805" x="133.51" y="273.3299">then reports and STOPS. Never runs az/docker/</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.6143" x="133.51" y="288.6405">brew. The diagram stereotypes are documentation</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="285.689" x="133.51" y="303.951">only &#8212; NOT the gated security-marker parity</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="315.2373" x="133.51" y="319.2616">mechanism. Realized by SEQ-DEPLOY-GUIDANCE.</text></g><g class="entity" data-qualified-name="GMN18" data-source-line="58" id="ent0019"><path d="M607.83,43.4883 L607.83,99.4199 L942.3788,99.4199 L942.3788,53.4883 L932.3788,43.4883 L607.83,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M932.3788,43.4883 L932.3788,53.4883 L942.3788,53.4883 L932.3788,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308.4072" x="613.83" y="61.0566">Not a gate. /mdd-validate, /mdd-review and the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="313.5488" x="613.83" y="76.3672">/mdd-cycle parity loop never read .mdd/deploy/.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220.4351" x="613.83" y="91.6777">Realized by SEQ-DEPLOY-INSPECT.</text></g><g class="entity" data-qualified-name="GMN21" data-source-line="64" id="ent0022"><path d="M595.33,134.1783 L595.33,220.731 L954.8696,220.731 L954.8696,144.1783 L944.8696,134.1783 L595.33,134.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M944.8696,134.1783 L944.8696,144.1783 L954.8696,144.1783 L944.8696,134.1783" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="336.6606" x="601.33" y="151.7466">Cycle 0016: mandatory &#171;include&#187;; no purpose-driven</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="338.5396" x="601.33" y="167.0572">default until dev/staging/prod is confirmed (no silent</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="320.271" x="601.33" y="182.3677">default). Surfaces sizing/posture options; operator</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.1201" x="601.33" y="197.6783">confirms; secure-by-default preserved.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="278.7446" x="601.33" y="212.9888">Constrained by OCL-DEPLOY-IAC-PURPOSE.</text></g><g class="entity" data-qualified-name="GMN24" data-source-line="72" id="ent0025"><path d="M591.98,255.8283 L591.98,327.0705 L958.229,327.0705 L958.229,265.8283 L948.229,255.8283 L591.98,255.8283" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M948.229,255.8283 L948.229,265.8283 L958.229,265.8283 L948.229,255.8283" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="340.9961" x="597.98" y="273.3966">Cycle 0016: mandatory &#171;include&#187;; every secured store</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="323.9272" x="597.98" y="288.7072">needs a named reader AND writer with an admitted</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="325.2222" x="597.98" y="304.0177">network path, else surfaced as a blocking question.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="345.249" x="597.98" y="319.3283">Constrained by OCL-DEPLOY-IAC-ACCESS-COMPLETE.</text></g><!--link Op to Guide--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="35" id="lnk8"><path d="M66.77,567.7983 C75.67,558.4383 85.91,548.8983 96.51,541.4483 C130.91,517.2983 167.3329,499.706 204.0529,484.946" fill="none" id="Op-to-Guide" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="209.62,482.7083,199.7775,482.3535,204.9808,484.5731,202.7612,489.7763,209.62,482.7083" style="stroke:#181818;stroke-width:1;"/></g><!--link Op to Inspect--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="36" id="lnk9"><path d="M66.97,596.2083 C76.37,594.1083 86.84,591.9783 96.51,590.4483 C198.96,574.3083 480.54,610.8483 561.04,545.4483 C595.74,517.2683 558.39,479.9783 591.04,449.4483 C609.78,431.9283 628.4465,422.5689 653.3565,415.8589" fill="none" id="Op-to-Inspect" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="659.15,414.2983,649.4194,412.7768,654.3221,415.5988,651.5002,420.5015,659.15,414.2983" style="stroke:#181818;stroke-width:1;"/></g><!--link Op to Purpose--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="37" id="lnk10"><path d="M67,610.4283 C149.64,628.2583 387.36,669.0283 561.04,593.4483 C578.62,585.7983 574.69,572.4583 591.04,562.4483 C608.9,551.5183 623.4032,544.6065 643.6432,537.3365" fill="none" id="Op-to-Purpose" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="649.29,535.3083,639.4677,534.5862,644.5843,536.9985,642.172,542.115