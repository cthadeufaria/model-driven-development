<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="416px" preserveAspectRatio="none" style="width:938px;height:416px;background:#FFFFFF;" version="1.1" viewBox="0 0 938 416" width="938px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="16"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="417.334" x="257.1274" y="23.5352">/mdd-deploy deployment guidance &#8212; use cases (current)</text></g><!--cluster mdd toolchain (utility, outside the parity gate)--><g class="cluster" data-qualified-name="mdd toolchain .utility. outside the parity gate." data-source-line="22" id="ent0003"><rect fill="none" height="125" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="762.19" x="132.33" y="223.0483"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="333.1768" x="346.8366" y="238.5834">mdd toolchain (utility, outside the parity gate)</text></g><!--entity Guide--><g class="entity" data-qualified-name="mdd toolchain .utility. outside the parity gate..Guide" data-source-line="23" id="ent0004"><ellipse cx="298.7757" cy="295.049" fill="#F1F1F1" rx="150.4457" ry="37.0607" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="214.1289" x="191.7113" y="284.6185">Guide an Azure Container Apps</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="180.5029" x="208.5243" y="301.1068">deployment via a diagram,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.0254" x="203.763" y="317.5951">runbook, and generated IaC</text></g><!--entity Inspect--><g class="entity" data-qualified-name="mdd toolchain .utility. outside the parity gate..Inspect" data-source-line="24" id="ent0005"><ellipse cx="756.3148" cy="295.0492" fill="#F1F1F1" rx="122.2048" ry="26.841" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.7861" x="682.4217" y="289.3297">Inspect the generated</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.9961" x="660.8167" y="305.8179">deployment diagram as SVG</text></g><!--entity Op--><g class="entity" data-qualified-name="Op" data-source-line="20" id="ent0002"><ellipse cx="36.2559" cy="335.2983" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M36.2559,343.2983 L36.2559,370.2983 M23.2559,351.2983 L49.2559,351.2983 M36.2559,370.2983 L23.2559,385.2983 M36.2559,370.2983 L49.2559,385.2983" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="60.5117" x="6" y="400.3334">Operator</text></g><g class="entity" data-qualified-name="GMN9" data-source-line="33" id="ent0010"><path d="M127.51,43.4883 L127.51,206.5938 A0,0 0 0 0 127.51,206.5938 L294.78,206.5938 L298.78,257.5283 L302.78,206.5938 L470.0378,206.5938 A0,0 0 0 0 470.0378,206.5938 L470.0378,53.4883 L460.0378,43.4883 L127.51,43.4883 A0,0 0 0 0 127.51,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M460.0378,43.4883 L460.0378,53.4883 L470.0378,53.4883 L460.0378,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.1514" x="133.51" y="61.0566">Implemented in templates::MDD_DEPLOY_SKILL:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.3613" x="133.51" y="76.3672">v1 supports only azure-container-apps</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.9517" x="133.51" y="91.6777">(../atlas-ate-server); any other target is</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="294.4741" x="133.51" y="106.9883">rejected. Reads MDD models + the target repo</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="271.6606" x="133.51" y="122.2988">read-only, pauses on ambiguity, writes the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.5278" x="133.51" y="137.6094">deployment diagram + runbook + generated infra,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="300.9805" x="133.51" y="152.9199">then reports and STOPS. Never runs az/docker/</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.6143" x="133.51" y="168.2305">brew. The diagram stereotypes are documentation</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="285.689" x="133.51" y="183.541">only &#8212; NOT the gated security-marker parity</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="315.2373" x="133.51" y="198.8516">mechanism. Realized by SEQ-DEPLOY-GUIDANCE.</text></g><g class="entity" data-qualified-name="GMN12" data-source-line="46" id="ent0013"><path d="M589.04,151.0783 L589.04,207.0099 A0,0 0 0 0 589.04,207.0099 L752.31,207.0099 L756.31,267.8583 L760.31,207.0099 L923.5888,207.0099 A0,0 0 0 0 923.5888,207.0099 L923.5888,161.0783 L913.5888,151.0783 L589.04,151.0783 A0,0 0 0 0 589.04,151.0783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M913.5888,151.0783 L913.5888,161.0783 L923.5888,161.0783 L913.5888,151.0783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308.4072" x="595.04" y="168.6466">Not a gate. /mdd-validate, /mdd-review and the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="313.5488" x="595.04" y="183.9572">/mdd-cycle parity loop never read .mdd/deploy/.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220.4351" x="595.04" y="199.2677">Realized by SEQ-DEPLOY-INSPECT.</text></g><!--link Op to Guide--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="27" id="lnk6"><path d="M66.89,357.0783 C98.23,348.6583 143.6454,336.4547 189.8854,324.0347" fill="none" id="Op-to-Guide" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="195.68,322.4783,185.9505,320.9498,190.8512,323.7753,188.0257,328.676,195.68,322.4783" style="stroke:#181818;stroke-width:1;"/></g><!--link Op to Inspect--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="28" id="lnk7"><path d="M66.76,365.5983 C136.92,366.5783 319.13,367.0983 470.04,350.0483 C538.45,342.3083 609.1598,328.4759 665.7298,316.0459" fill="none" id="Op-to-Inspect" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="671.59,314.7583,661.9413,312.783,666.7065,315.8313,663.6581,320.5966,671.59,314.7583" style="stroke:#181818;stroke-width:1;"/></g><!--link Guide to Inspect--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="30" id="lnk8"><path d="M449.57,295.0483 C509.34,295.0483 571.26,295.0483 627.88,295.0483" fill="none" id="Guide-to-Inspect" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#181818" points="633.88,295.0483,624.88,291.0483,628.88,295.0483,624.88,299.0483,633.88,295.0483" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="57.1924" x="501