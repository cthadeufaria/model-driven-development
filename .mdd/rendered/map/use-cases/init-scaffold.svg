<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="736px" preserveAspectRatio="none" style="width:1035px;height:736px;background:#FFFFFF;" version="1.1" viewBox="0 0 1035 736" width="1035px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="13"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="536.6416" x="245.8892" y="23.5352">MDD init &#8212; force-overwrite scaffolding + forward-migrate state (current)</text></g><!--cluster mdd init--><g class="cluster" data-qualified-name="mdd init" data-source-line="19" id="ent0003"><rect fill="none" height="337" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="817.24" x="204.18" y="327.7583"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="60.7168" x="582.4416" y="343.2934">mdd init</text></g><!--entity Force--><g class="entity" data-qualified-name="mdd init.Force" data-source-line="20" id="ent0004"><ellipse cx="391.5968" cy="398.7555" fill="#F1F1F1" rx="117.2168" ry="36.1172" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="170.5977" x="306.2979" y="389.7198">Overwrite all regenerable</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="139.4395" x="321.877" y="406.2081">scaffolding (--force)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="127.8867" x="327.6534" y="422.6963">no per-file prompt</text></g><!--entity Prompt--><g class="entity" data-qualified-name="mdd init.Prompt" data-source-line="21" id="ent0005"><ellipse cx="915.488" cy="564.7629" fill="#F1F1F1" rx="89.928" ry="25.6646" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="126.4785" x="852.2487" y="562.2006">Keep per-file [o/S]</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="111.166" x="859.905" y="578.6889">prompt (no flag)</text></g><!--entity Migrate--><g class="entity" data-qualified-name="mdd init.Migrate" data-source-line="22" id="ent0006"><ellipse cx="391.5997" cy="504.7626" fill="#F1F1F1" rx="124.3797" ry="35.3643" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="185.5137" x="298.8428" y="496.8761">Forward-migrate state files</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="174.2959" x="304.4517" y="513.3644">config / trace / approvals</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="113.7705" x="334.7144" y="529.8527">(never overwrite)</text></g><!--entity Ralph--><g class="entity" data-qualified-name="mdd init.Ralph" data-source-line="23" id="ent0007"><ellipse cx="391.6016" cy="611.7626" fill="#F1F1F1" rx="171.4216" ry="36.6843" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="199.2881" x="291.9575" y="597.5944">Scaffold the Ralph workspace</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="302.3057" x="240.4487" y="614.0827">mdd-ralph skill + PROMPT.md (regenerable)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="252.3828" x="265.4102" y="630.5709">seed PLAN.md once (never overwrite)</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="17" id="ent0002"><ellipse cx="68.3164" cy="546.0183" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M68.3164,554.0183 L68.3164,581.0183 M55.3164,562.0183 L81.3164,562.0183 M68.3164,581.0183 L55.3164,596.0183 M68.3164,581.0183 L81.3164,596.0183" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="124.6328" x="6" y="611.0534">Developer / Agent</text></g><g class="entity" data-qualified-name="GMN13" data-source-line="34" id="ent0014"><path d="M210.66,255.7983 L210.66,311.7299 A0,0 0 0 0 210.66,311.7299 L387.6,311.7299 L391.6,362.3783 L395.6,311.7299 L572.5355,311.7299 A0,0 0 0 0 572.5355,311.7299 L572.5355,265.7983 L562.5355,255.7983 L210.66,255.7983 A0,0 0 0 0 210.66,255.7983" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M562.5355,255.7983 L562.5355,265.7983 L572.5355,265.7983 L562.5355,255.7983" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="340.1519" x="216.66" y="273.3666">USE-INIT-FORCE: --force = always-Overwrite handler</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="294.6265" x="216.66" y="288.6772">over the regenerable files. The three state files</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="340.8755" x="216.66" y="303.9877">bypass the handler and are migrated, not overwritten.</text></g><g class="entity" data-qualified-name="GMN16" data-source-line="40" id="ent0017"><path d="M191.63,164.7983 L191.63,220.7299 L591.5597,220.7299 L591.5597,174.7983 L581.5597,164.7983 L191.63,164.7983" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M581.5597,164.7983 L581.5597,174.7983 L591.5597,174.7983 L581.5597,164.7983" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="378.9297" x="197.63" y="182.3666">USE-INIT-MIGRATE: write_yaml_create_or_migrate upgrades</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="305.8491" x="197.63" y="197.6772">a state file only when on-disk version &lt; current;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="306.1602" x="197.63" y="212.9877">equal = untouched; newer = never downgraded.</text></g><g class="entity" data-qualified-name="GMN19" data-source-line="46" id="ent0020"><path d="M205.74,43.4883 L205.74,130.041 L577.4607,130.041 L577.4607,53.4883 L567.4607,43.4883 L205.74,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M567.4607,43.4883 L567.4607,53.4883 L577.4607,53.4883 L567.4607,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="311.8223" x="211.74" y="61.0566">USE-INIT-RALPH: init seeds the Ralph workspace.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="327.8818" x="211.74" y="76.3672">mdd-ralph SKILL.md + .mdd/ralph/PROMPT.md are</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="350.7207" x="211.74" y="91.6777">Regenerable (--force overwrites). .mdd/ralph/PLAN.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="320.9756" x="211.74" y="106.9883">is SeededOnce: write_text_create_if_missing, never</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="314.7549" x="211.74" y="122.2988">overwritten (even by --force) and never migrated.</text></g><!--link Dev to Force--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="26" id="lnk8"><path d="M97.92,537.3083 C120.46,509.6283 154.24,473.4783 191.63,451.7583 C220.53,434.9683 249.0381,424.8292 280.9781,416.8692" fill="none" id="Dev-to-Force" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="286.8,415.4183,277.0998,413.7134,281.9484,416.6274,279.0344,421.476,286.8,415.4183" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Prompt--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="27" id="lnk9"><path d="M108.3,614.4983 C130.66,633.9583 160.45,655.5283 191.63,665.7583 C360.51,721.1983 415.85,692.5983 591.56,665.7583 C690.42,650.6583 795.0431,613.1914 857.7631,588.3014" fill="none" id="Dev-to-Prompt" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="863.34,586.0883,853.4992,585.6901,858.6926,587.9326,856.4501,593.126,863.34,586.0883" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Migrate--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="28" id="lnk10"><path d="M130.88,562.1583 C176.53,552.0683 233.8115,539.4136 286.4115,527.7836" fill="none" id="Dev-to-Migrate" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="292.27,526.4883,282.6187,524.5256,287.3879,527.5677,284.3458,532.337,292.27,526.4883" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Ralph--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="29" id="lnk11"><path d="M130.88,582.6583 C161.77,586.1183 194.7073,589.8106 232.9273,594.0906" fill="none" id="Dev-to-Ralph" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="238.89,594.7583,230.3911,589.7815,233.9211,594.2018,229.5008,597.7318,238.89,594.7583" style="stroke:#181818;stroke-width:1;"/></g><!--link Force to Prompt--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="31" id="lnk12"><path d="M483.64,421.4583 C517.67,430.3483 556.54,440.9883 591.56,451.7583 C686.8,481.0583 790.2546,518.3915 854.1446,542.0915" fill="none" id="Force-to-P