<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="279px" preserveAspectRatio="none" style="width:530px;height:279px;background:#FFFFFF;" version="1.1" viewBox="0 0 530 279" width="530px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="8"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="328.3096" x="97.3851" y="23.5352">MDD greenfield kickoff &#8212; use cases (current)</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="11" id="ent0002"><ellipse cx="40.1592" cy="55.6783" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M40.1592,63.6783 L40.1592,90.6783 M27.1592,71.6783 L53.1592,71.6783 M40.1592,90.6783 L27.1592,105.6783 M40.1592,90.6783 L53.1592,105.6783" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="68.3184" x="6" y="120.7134">Developer</text></g><!--entity Kickoff--><g class="entity" data-qualified-name="Kickoff" data-source-line="13" id="ent0003"><ellipse cx="324.7042" cy="85.4265" fill="#F1F1F1" rx="146.5242" ry="41.9382" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="193.5186" x="227.945" y="69.6558">Kick off a greenfield project:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="221.2998" x="214.0543" y="86.1441">interview -&gt; signed-off brief -&gt;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="243.0996" x="203.1544" y="102.6324">full objective -&gt; Ralph-ready PLAN,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="64.627" x="292.3908" y="119.1207">then stop</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="18" id="ent0006"><path d="M134.32,162.4983 L134.32,264.3616 A0,0 0 0 0 134.32,264.3616 L515.0798,264.3616 A0,0 0 0 0 515.0798,264.3616 L515.0798,172.4983 L505.0798,162.4983 L328.7,162.4983 L324.7,127.8383 L320.7,162.4983 L134.32,162.4983 A0,0 0 0 0 134.32,162.4983" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M505.0798,162.4983 L505.0798,172.4983 L515.0798,172.4983 L505.0798,162.4983" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.4814" x="140.32" y="180.0666">Code: the /mdd-kickoff skill registered in</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="327.9961" x="140.32" y="195.3772">templates::WORKFLOW_SKILLS, shipped as SKILL.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="261.1299" x="140.32" y="210.6877">to .claude/ and .codex/. Utility, opens no</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="280.4521" x="140.32" y="225.9983">cycle. Two human gates (brief sign-off, final</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="289.98" x="140.32" y="241.3088">stop); never auto-launches Ralph. Realized by</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="359.7598" x="140.32" y="256.6194">SEQ-KICKOFF; each PLAN item feeds USE-REALIZE-SLICE.</text></g><!--link Dev to Kickoff--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="15" id="lnk4"><path d="M74.68,85.4283 C100.84,85.4283 133.15,85.4283 171.91,85.4283" fill="none" id="Dev-to-Kickoff" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="177.91,85.4283,168.9