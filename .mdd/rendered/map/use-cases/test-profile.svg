<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="375px" preserveAspectRatio="none" style="width:1476px;height:375px;background:#FFFFFF;" version="1.1" viewBox="0 0 1476 375" width="1476px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="15"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="456.7432" x="506.5763" y="23.5352">MDD diagram-driven tests &#8212; profile, plan, green gate (current)</text></g><!--cluster mdd test tooling--><g class="cluster" data-qualified-name="mdd test tooling" data-source-line="21" id="ent0003"><rect fill="none" height="123" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="1119.4" x="259.65" y="168.4483"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="119.916" x="759.392" y="183.9834">mdd test tooling</text></g><!--entity Detect--><g class="entity" data-qualified-name="mdd test tooling.Detect" data-source-line="22" id="ent0004"><ellipse cx="404.2127" cy="240.4492" fill="#F1F1F1" rx="128.5527" ry="35.4209" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="191.5566" x="308.4344" y="232.475">Detect the per-layer runner,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="87.2949" x="360.5653" y="248.9633">then confirm</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="119.6699" x="344.3778" y="265.4516">(no silent default)</text></g><!--entity Plan--><g class="entity" data-qualified-name="mdd test tooling.Plan" data-source-line="23" id="ent0005"><ellipse cx="843.1235" cy="239.4465" fill="#F1F1F1" rx="94.3335" ry="36.3782" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="135.3516" x="775.4477" y="230.0202">Emit a deterministic</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="116.8262" x="784.7104" y="246.5085">ordered test plan</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="107.0166" x="789.6152" y="262.9968">(mdd test-plan)</text></g><!--entity Green--><g class="entity" data-qualified-name="mdd test tooling.Green" data-source-line="24" id="ent0006"><ellipse cx="1265.6711" cy="239.445" fill="#F1F1F1" rx="97.3811" ry="34.7367" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.1025" x="1192.1198" y="232.5455">Run the plan at close,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="94.3906" x="1218.4758" y="249.0337">gate on green</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="68.4414" x="1231.4504" y="265.522">(test.gate)</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="19" id="ent0002"><ellipse cx="68.3164" cy="210.7083" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M68.3164,218.7083 L68.3164,245.7083 M55.3164,226.7083 L81.3164,226.7083 M68.3164,245.7083 L55.3164,260.7083 M68.3164,245.7083 L81.3164,260.7083" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="124.6328" x="6" y="275.7434">Developer / Agent</text></g><g class="entity" data-qualified-name="GMN12" data-source-line="35" id="ent0013"><path d="M191.63,43.4883 L191.63,99.4199 A0,0 0 0 0 191.63,99.4199 L400.21,99.4199 L404.21,204.8083 L408.21,99.4199 L616.7789,99.4199 A0,0 0 0 0 616.7789,99.4199 L616.7789,53.4883 L606.778