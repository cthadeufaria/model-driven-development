88.47,250.7483 L226.69,158.7383 L280.47,250.7483 L158.42,250.7483 A0,0 0 0 0 158.42,250.7483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M463.9766,250.7483 L463.9766,260.7483 L473.9766,260.7483 L463.9766,250.7483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="269.8706" x="164.42" y="268.3166">MddViewer::ocl_ui: Source paints `source`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="294.5566" x="164.42" y="283.6272">(read-only, @id/context/inv colored); Diagram</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="261.5806" x="164.42" y="298.9377">loads Project::rendered_svg_path(.ocl) via</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.2285" x="164.42" y="314.2483">DiagramPage and paints it with paint_canvas,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="292.8999" x="164.42" y="329.5588">else a placeholder (OCL-OCL-VIEW-SUBMODE,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="241.0205" x="164.42" y="344.8694">OCL-OCL-DIAGRAM-NEEDS-RENDER).</text></g><g class="entity" data-qualified-name="GMN15" data-source-line="60" id="ent0016"><path d="M736.06,235.4383 L736.06,367.9227 A0,0 0 0 0 736.06,367.9227 L1068.3491,367.9227 A0,0 0 0 0 1068.3491,367.9227 L1068.3491,245.4383 L1058.3491,235.4383 L906.2,235.4383 L902.2,142.0983 L898.2,235.4383 L736.06,235.4383 A0,0 0 0 0 736.06,235.4383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1058.3491,235.4383 L1058.3491,245.4383 L1068.3491,245.4383 L1058.3491,235.4383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="282.3818" x="742.06" y="253.0066">MddViewer::source_ui (View::Source branch):</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="244.6895" x="742.06" y="268.3172">reads the selected model file once into</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="295.1343" x="742.06" y="283.6277">`source` (cached by `loaded`) and paints it in</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="300.2886" x="742.06" y="298.9383">egui::ScrollArea::both as read-only monospace,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="291.9985" x="742.06" y="314.2488">highlighting `' @` markers, `@start`/`@end`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="311.2891" x="742.06" y="329.5594">directives and `'` comments. No DiagramPage or</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272.9238" x="742.06" y="344.8699">rasterizer call, so it needs no rendered SVG</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="222.9487" x="742.06" y="360.1805">(OCL-PUML-SOURCE-NO-RENDER).</text></g><!--reverse link SvgRasterizer to FontDatabase--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="aggregation" data-source-line="40" id="lnk7"><path codeLine="40" d="M605.2,154.0983 C605.2,185.9583 605.2,218.8283 605.2,252.7183" fill="none" id="SvgRasterizer-backto-FontDatabase" style="stroke:#181818;stroke-width:1;"/><polygon fill="none" points="605.2,142.0983,601.2,148.0983,605.2,154.0983,609.2,148.0983,605.2,142.0983" style="stroke:#181818;stroke-width:1;"/><polygon fill="#000000" points="610.2,202.0936,613.1389,193.0485,607.2611,193.0485,610.2,202.0936" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-fam