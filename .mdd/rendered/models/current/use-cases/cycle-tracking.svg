ext><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="196.1914" x="651.4237" y="324.8493">directory tree (VSCode-style)</text></g><!--entity Group--><g class="entity" data-qualified-name="mdd toolchain . viewer.Group" data-source-line="27" id="ent0006"><ellipse cx="1174.6414" cy="239.0786" fill="#F1F1F1" rx="96.5014" ry="21.7003" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="167.8496" x="1090.7166" y="243.8227">Group diagrams by cycle</text></g><!--entity Diff--><g class="entity" data-qualified-name="mdd toolchain . viewer.Diff" data-source-line="28" id="ent0007"><ellipse cx="299.1348" cy="325.0808" fill="#F1F1F1" rx="78.2048" ry="25.4525" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="92.2236" x="253.023" y="320.3323">View a cycle's</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="110.4551" x="243.9072" y="336.8206">before/after diff</text></g><!--entity Desc--><g class="entity" data-qualified-name="mdd toolchain . viewer.Desc" data-source-line="29" id="ent0008"><ellipse cx="1174.6418" cy="320.0766" fill="#F1F1F1" rx="111.1418" ry="24.6284" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="174.8496" x="1087.217" y="320.3346">Read a diagram element's</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="76.0771" x="1136.6032" y="336.8228">description</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="22" id="ent0002"><ellipse cx="40.1592" cy="353.3283" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M40.1592,361.3283 L40.1592,388.3283 M27.1592,369.3283 L53.1592,369.3283 M40.1592,388.3283 L27.1592,403.3283 M40.1592,388.3283 L53.1592,403.3283" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="68.3184" x="6" y="418.3634">Developer</text></g><g class="entity" data-qualified-name="GMN16" data-source-line="42" id="ent0017"><path d="M583.95,43.4883 L583.95,148.0983 L366.78,217.8583 L583.95,156.0983 L583.95,160.6621 A0,0 0 0 0 583.95,160.6621 L915.0901,160.6621 A0,0 0 0 0 915.0901,160.6621 L915.0901,53.4883 L905.0901,43.4883 L583.95,43.4883 A0,0 0 0 0 583.95,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M905.0901,43.4883 L905.0901,53.4883 L915.0901,53.4883 L905.0901,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="266.9316" x="589.95" y="61.0566">Code: the /mdd-cycle skill is registered in</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="289.7832" x="589.95" y="76.3672">templates::WORKFLOW_SKILLS and shipped as</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.564" x="589.95" y="91.6777">SKILL.md to .claude/ and .codex/. Entry</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="274.041" x="589.95" y="106.9883">selection (generate vs map-no-comments),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272.5303" x="589.95" y="122.2988">cycle-boundary ownership, the parity loop,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="262.6343" x="589.95" y="137.6094">and the mandatory clarification pause are</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="310.1401" x="589.95" y="152.9199">documented there. Realized by SEQ-RUN-CYCLE.</text></g><g class="entity" data-qualified-name="GMN19" data-source-line="52" id="ent0020"><path d="M135.32,89.4483 L135.32,160.6905 L462.9499,160.6905 L462.9499,99.4483 L452.9499,89.4483 L135.32,89.4483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M452.9499,89.4483 L452.9499,99.4483 L462.9499,99.4483 L452.9499,89.4483" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="225.8496" x="141.32" y="107.0166">Code: MddViewer::diff_ui consumes</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="283.791" x="141.32" y="122.3272">Project::cycle_diffs (mdd-core cycle module),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="306.6299" x="141.32" y="137.6377">rendering shared/added/removed element keys.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="244.4229" x="141.32" y="152.9483">Realized by SEQ-RENDER-CYCLE-DIFF.</text></g><g class="entity" data-qualified-name="GMN22" data-source-line="59" id="ent0023"><path d="M1034.09,89.4483 L1034.09,160.6905 L1315.1979,160.6905 L1315.1979,99.4483 L1305.1979,89.4483 L1034.09,89.4483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1305.1979,89.4483 L1305.1979,99.4483 L1315.1979,99.4483 L1305.1979,89.4483" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="231.918" x="1040.09" y="107.0166">Code: @desc(&lt;ID&gt;, "text") parsed by</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="260.1079" x="1040.09" y="122.3272">extract_descs into Project::descriptions();</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="201.5952" x="1040.09" y=