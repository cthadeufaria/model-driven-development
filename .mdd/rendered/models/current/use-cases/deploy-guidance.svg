<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="565px" preserveAspectRatio="none" style="width:994px;height:565px;background:#FFFFFF;" version="1.1" viewBox="0 0 994 565" width="994px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="15"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="417.334" x="284.848" y="23.5352">/mdd-deploy deployment guidance &#8212; use cases (current)</text></g><!--cluster mdd toolchain (utility, outside the parity gate)--><g class="cluster" data-qualified-name="mdd toolchain .utility. outside the parity gate." data-source-line="21" id="ent0003"><rect fill="none" height="215" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="841.03" x="139" y="313.9683"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="333.1768" x="392.9266" y="329.5034">mdd toolchain (utility, outside the parity gate)</text></g><!--entity Guide--><g class="entity" data-qualified-name="mdd toolchain .utility. outside the parity gate..Guide" data-source-line="22" id="ent0004"><ellipse cx="305.4457" cy="388.969" fill="#F1F1F1" rx="150.4457" ry="37.0607" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="214.1289" x="198.3813" y="378.5385">Guide an Azure Container Apps</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="180.5029" x="215.1943" y="395.0268">deployment via a diagram,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.0254" x="210.433" y="411.5151">runbook, and generated IaC</text></g><!--entity Dialect--><g class="entity" data-qualified-name="mdd toolchain .utility. outside the parity gate..Dialect" data-source-line="23" id="ent0005"><ellipse cx="788.1373" cy="386.9657" fill="#F1F1F1" rx="175.8873" ry="37.5775" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="233.7959" x="671.2394" y="374.4786">Choose &amp; CONFIRM the IaC dialect</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="227.2061" x="674.5343" y="390.9669">(Bicep XOR Terraform) before any</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="249.0195" x="663.6275" y="407.4552">artifact is written &#8212; no silent default</text></g><!--entity Inspect--><g class="entity" data-qualified-name="mdd toolchain .utility. outside the parity gate..Inspect" data-source-line="24" id="ent0006"><ellipse cx="788.1448" cy="485.9692" fill="#F1F1F1" rx="122.2048" ry="26.841" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.7861" x="714.2517" y="480.2497">Inspect the generated</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.9961" x="692.6467" y="496.7379">deployment diagram as SVG</text></g><!--entity Op--><g class="entity" data-qualified-name="Op" data-source-line="19" id="ent0002"><ellipse cx="36.2559" cy="451.2283" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M36.2559,459.2283 L36.2559,486.2283 M23.2559,467.2283 L49.2559,467.2283 M36.2559,486.2283 L23.2559,501.2283 M36.2559,486.2283 L49.2559,501.2283" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="60.5117" x="6" y="516.2634">Operator</text></g><g class="entity" data-qualified-name="GMN12" data-source-line="35" id="ent0013"><path d="M127.51,43.4883 L127.51,298.457 A0,0 0 0 0 127.51,298.457 L301.45,298.457 L305.45,351.4983 L309.45,298.457 L483.387,298.457 A0,0 0 0 0 483.387,298.457 L483.387,53.4883 L473.387,43.4883 L127.51,43.4883 A0,0 0 0 0 127.51,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M473.387,43.4883 L473.387,53.4883 L483.387,53.4883 L473.387,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.1514" x="133.51" y="61.0566">Implemented in templates::MDD_DEPLOY_SKILL:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.3613" x="133.51" y="76.3672">v1 supports only azure-container-apps</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.9517" x="133.51" y="91.6777">(../atlas-ate-server); any other target is</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="294.4741" x="133.51" y="106.9883">rejected. Reads MDD models + the target repo</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="305.2778" x="133.51" y="122.2988">read-only. PAUSES with a BLOCKING clarification</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="297.6226" x="133.51" y="137.6094">(step 3) on ambiguity OR a statically detectable</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="313.5298" x="133.51" y="152.9199">go-live landmine &#8212; never a buried runbook STOP</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="320.3535" x="133.51" y="168.2305">note. Writes the deployment diagram + runbook +</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="334.877" x="133.51" y="183.541">SECURE-BY-DEFAULT generated IaC in the confirmed</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.4175" x="133.51" y="198.8516">dialect (step 6 &#8212; no store left more network-open</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="302.9165" x="133.51" y="214.1621">than its peers; migrations-before-traffic stays a</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="322.9688" x="133.51" y="229.4727">documented procedural tradeoff), then reports and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="320.9121" x="133.51" y="244.7832">STOPS. Never runs az/docker/terraform/brew. The</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="331.8491" x="133.51" y="260.0938">diagram stereotypes are documentation only &#8212; NOT</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245.7178" x="133.51" y="275.4043">the gated security-marker mechanism.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.1362" x="133.51" y="290.7148">Realized by SEQ-DEPLOY-GUIDANCE.</text></g><g class="entity" data-qualified-name="GMN15" data-source-line="54" id="ent0016"><path d="M604.39,74.7283 L604.39,207.2127 L971.9022,207.2127 L971.9022,84.7283 L961.9022,74.7283 L604.39,74.7283" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M961.9022,74.7283 L961.9022,84.7283 L971.9022,84.7283 L961.9022,74.7283" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="346.5122" x="610.39" y="92.2966">Implemented in templates::MDD_DEPLOY_SKILL step 4.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="297.5845" x="610.39" y="107.6072">Mandatory &#171;include&#187;: guidance cannot proceed</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="275.7866" x="610.39" y="122.9177">until the dialect is explicitly confirmed. One</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="274.2061" x="610.39" y="138.2283">dialect per run (Bicep XOR Terraform). FULL</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="280.4204" x="610.39" y="153.5388">PARITY &#8212; both dialects enforce the identical</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="317.6812" x="610.39" y="168.8494">invariant checklist and secure-by-default posture;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="273.1206" x="610.39" y="184.1599">only IaC structure differs. No silent default.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.1362" x="610.39" y="199.4705">Realized by SEQ-DEPLOY-GUIDANCE.</text></g><g class="entity" data-qualified-name="GMN18" data-source-line="65" id="ent0019"><path d="M620.87,241.9983 L620.87,297.9299 L955.4188,297.9299 L955.4188,251.9983 L945.4188,241.9983 L620.87,241.9983" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M945.4188,241.9983 L945.4188,251.9983 L955.4188,251.9983 L945.4188,241.9983" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308.4072" x="626.87" y="259.5666">Not a gate. /mdd-validate, /mdd-review and the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="313.5488" x="626.87" y="274.8772">/mdd-cycle parity loop never read .mdd/deploy/.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220.4351" x="626.87" y="290.1877">Realized by SEQ-DEPLOY-INSPECT.</text></g><!--link Op to Guide--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="27" id="lnk7"><path d="M66.84,467.2483 C76.24,463.0883 86.74,458.6483 96.51,454.9683 C132.31,441.4783 166.5002,430.1386 201.7102,419.1986" fill="none" id="Op-to-Guide" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="207.44,417.4183,197.6584,416.2689,202.6652,418.9019,200.0322,423.9086,207.44,417.4183" style="stroke:#181818;stroke-width:1;"/></g><!--link Op to Dialect--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="28" id="lnk8"><path d="M66.92,481.3983 C148.54,482.0983 383.1,480.8583 574.39,447.9683 C596.54,444.1583 637.1406,432.8043 680.9306,419.7343" fill="none" id="Op-to-Dialect" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="686.68,418.0183,676.9119,416.7594,681.8889,419.4483,679.2,424.4252,686.68,418.0183" style="stroke:#181818;stroke-width:1;"/></g><!--link Op to Inspect--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="29" id="lnk9"><path d="M66.9,496.8283 C76.13,500.9783 86.51,504.8683 96.51,506.9683 C304.38,550.5683 362.26,517.4083 574.39,506.9683 C608.68,505.2783 640.0006,502.6734 673.6406,499.2634" fill="none" id="Op-to-Inspect" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="679.61,498.6583,670.2525,495.5863,674.6355,499.1625,671.0593,503.5455,679.61,498.6583" style="stroke:#181818;stroke-width:1;"/></g><!--link Guide to Dialect--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="31" id="lnk10"><path d="M456.24,388.3483 C505.56,388.1383 554.8401,387.933 605.8801,387.723" fill="none" id="Guide-to-Dialect" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#181818" points="6