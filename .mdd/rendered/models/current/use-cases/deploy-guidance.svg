<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="553px" preserveAspectRatio="none" style="width:935px;height:553px;background:#FFFFFF;" version="1.1" viewBox="0 0 935 553" width="935px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="13"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="417.334" x="255.3424" y="23.5352">/mdd-deploy deployment guidance &#8212; use cases (current)</text></g><!--cluster mdd toolchain (utility, outside the parity gate)--><g class="cluster" data-qualified-name="mdd toolchain .utility. outside the parity gate." data-source-line="19" id="ent0003"><rect fill="none" height="125" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="760.4" x="130.55" y="359.9383"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="333.1768" x="344.1616" y="375.4734">mdd toolchain (utility, outside the parity gate)</text></g><!--entity Guide--><g class="entity" data-qualified-name="mdd toolchain .utility. outside the parity gate..Guide" data-source-line="20" id="ent0004"><ellipse cx="296.9857" cy="431.939" fill="#F1F1F1" rx="150.4457" ry="37.0607" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="214.1289" x="189.9213" y="421.5085">Guide an Azure Container Apps</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="180.5029" x="206.7343" y="437.9968">deployment via a diagram,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.0254" x="201.973" y="454.4851">runbook, and generated IaC</text></g><!--entity Inspect--><g class="entity" data-qualified-name="mdd toolchain .utility. outside the parity gate..Inspect" data-source-line="21" id="ent0005"><ellipse cx="752.7548" cy="431.9392" fill="#F1F1F1" rx="122.2048" ry="26.841" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.7861" x="678.8617" y="426.2197">Inspect the generated</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.9961" x="657.2567" y="442.7079">deployment diagram as SVG</text></g><!--entity Op--><g class="entity" data-qualified-name="Op" data-source-line="17" id="ent0002"><ellipse cx="36.2559" cy="472.1883" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M36.2559,480.1883 L36.2559,507.1883 M23.2559,488.1883 L49.2559,488.1883 M36.2559,507.1883 L23.2559,522.1883 M36.2559,507.1883 L49.2559,522.1883" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="60.5117" x="6" y="537.2234">Operator</text></g><g class="entity" data-qualified-name="GMN9" data-source-line="30" id="ent0010"><path d="M127.51,43.4883 L127.51,344.3887 A0,0 0 0 0 127.51,344.3887 L292.99,344.3887 L296.99,394.7483 L300.99,344.3887 L466.4704,344.3887 A0,0 0 0 0 466.4704,344.3887 L466.4704,53.4883 L456.4704,43.4883 L127.51,43.4883 A0,0 0 0 0 127.51,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M456.4704,43.4883 L456.4704,53.4883 L466.4704,53.4883 L456.4704,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.1514" x="133.51" y="61.0566">Implemented in templates::MDD_DEPLOY_SKILL:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.3613" x="133.51" y="76.3672">v1 supports only azure-container-apps</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="249.9517" x="133.51" y="91.6777">(../atlas-ate-server); any other target is</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="294.4741" x="133.51" y="106.9883">rejected. Reads MDD models + the target repo</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="305.2778" x="133.51" y="122.2988">read-only. PAUSES with a BLOCKING clarification</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="248.2632" x="133.51" y="137.6094">(step 3) on ambiguity OR on a statically</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.6782" x="133.51" y="152.9199">detectable go-live landmine (a generated config</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="278.7129" x="133.51" y="168.2305">default contradicting what the shipped code</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="277.6338" x="133.51" y="183.541">supports, e.g. AOAI managed-identity vs an</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="298.5239" x="133.51" y="198.8516">api-key-only server) &#8212; never a buried runbook</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="285.2065" x="133.51" y="214.1621">STOP note. Writes the deployment diagram +</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="307.3599" x="133.51" y="229.4727">runbook + SECURE-BY-DEFAULT generated infra</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="304.9541" x="133.51" y="244.7832">(step 5 &#8212; no store left more network-open than</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="270.626" x="133.51" y="260.0938">its peers; migrations-before-traffic stays a</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="295.4263" x="133.51" y="275.4043">documented procedural tradeoff), then reports</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="281.4932" x="133.51" y="290.7148">and STOPS. Never runs az/docker/brew. The</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="299.8125" x="133.51" y="306.0254">diagram stereotypes are documentation only &#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="317.9604" x="133.51" y="321.3359">NOT the gated security-marker parity mechanism.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.1362" x="133.51" y="336.6465">Realized by SEQ-DEPLOY-GUIDANCE.</text></g><g class="entity" data-qualified-name="GMN12" data-source-line="52" id="ent0013"><path d="M585.47,287.9683 L585.47,343.8999 A0,0 0 0 0 585.47,343.8999 L748.75,343.8999 L752.75,404.7483 L756.75,343.8999 L920.0188,343.8999 A0,0 0 0 0 920.0188,343.8999 L920.0188,297.9683 L910.0188,287.9683 L585.47,287.9683 A0,0 0 0 0 585.47,287.9683" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M910.0188,287.9683 L910.0188,297.9683 L920.0188,297.9683 L910.0188,287.9683" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308.4072" x="591.47" y="305.5366">Not a gate. /mdd-validate, /mdd-review and the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="313.5488" x="591.47" y="320.8472">/mdd-cycle parity loop never read .mdd/deploy/.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220.4351" x="591.47" y="336.1577">Realized by SEQ-DEPLOY-INSPECT.</text></g><!--link Op to Guide--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="24" id="lnk6"><path d="M66.94,493.9083 C98.06,485.4783 142.9384,473.3461 188.7084,460.9561" fill="none" id="Op-to-Guide" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="194.5,459.3883,184.7675,457.8789,189.6737,460.6948,186.8579,465.601,194.5,459.3883" style="stroke:#181818;stroke-width:1;"/></g><!--link Op to Inspect--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="25" id="lnk7"><path d="M66.77,502.4783 C136.54,503.4183 317,503.8483 466.47,486.9383 C534.88,479.1883 605.5898,465.3559 662.1598,452.9259" fill="none" id="Op-to-Inspect" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="668.02,451.6383,658.3713,449.663,663.1365,452.7113,660.0881,457.4766,668.02,451.6383" style="stroke:#181818;stroke-width:1;"/></g><!--link Guide to Inspect--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="27" id="lnk8"><path d="M447.83,431.9383 C507.07,431.9383 568.27,431.9383 624.38,431.9383" fill="none" id="Guide-to-Inspect" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#181818" points="630.38,431.9383,621.38,427.9383,625.38,431.9383,621.38,435.9383,630.38,431.9383" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="57.1924" x="497.47" y="428.5066">&#171;extend&#187;</text></g><?plantuml-src ZLPTRzis57tNhxZmI-FMaZ4CUqcBeexZ1aOoEukJ5GKAjBH8ArmaKY0ffyumO3zYlt2_PETIKk9aGT0tYxoVvvvxw5VqGSk3gzKiFPwTdoq_foTNy-F9OZeR9g-UNiqNg_FPz18tk9ispYaJKg-beiOhoeLNdZRMqRYICfMgBkrkH58vlLMIDivM5AuLwQekLGLN9H4cjr8TKb0u547vmyDVZu-_jlc-haxdPsVqXdJmz6bvSVhnRFcfFLmH_1sY8o22P7af6gd66KVxFlOtkYpzNXNZw9HLaYhjd7MUAYHpMfJw3gMjTuZn3UQaZG