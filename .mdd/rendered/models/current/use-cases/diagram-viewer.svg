83 A0,0 0 0 0 991.89,194.4583" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1260.8207,194.4583 L1260.8207,204.4583 L1270.8207,204.4583 L1260.8207,194.4583" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="242.582" x="997.89" y="212.0266">Today: a single flat, alphabetical scroll</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="223.5454" x="997.89" y="227.3372">list of every model file (left rail). No</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="257.9307" x="997.89" y="242.6477">directory tree, no cycle grouping, and no</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.5205" x="997.89" y="257.9583">before/after diff view exist in the code.</text></g><g class="entity" data-qualified-name="GMN20" data-source-line="37" id="ent0021"><path d="M585.19,43.4883 L585.19,160.6621 L930.8917,160.6621 L930.8917,53.4883 L920.8917,43.4883 L585.19,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M920.8917,43.4883 L920.8917,53.4883 L930.8917,53.4883 L920.8917,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="298.2256" x="591.19" y="61.0566">Right "MODEL CONTEXT" panel today: file path,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="261.8218" x="591.19" y="76.3672">kind, a raw @id list, and mechanical trace</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="273.5586" x="591.19" y="91.6777">links (from &#8594; relation &#8594; to) plus test paths</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="306.4268" x="591.19" y="106.9883">for the selected id. There is NO human-readable</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="280.4712" x="591.19" y="122.2988">description of the action / cycle that created</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="324.7017" x="591.19" y="137.6094">a diagram element, and no per-element annotation</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="204.8389" x="591.19" y="152.9199">surfaced on clicking an element.</text></g><g class="entity" data-qualified-name="GMN23" data-source-line="47" id="ent0024"><path d="M135.32,59.1483 L135.32,161.0116 A0,0 0 0 0 135.32,161.0116 L295.76,161.0116 L299.76,217.3783 L303.76,161.0116 L464.194,161.0116 A0,0 0 0 0 464.194,161.0116 L464.194,69.1483 L454.194,59.1483 L135.32,59.1483 A0,0 0 0 0 135.32,59.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M454.194,59.1483 L454.194,69.1483 L464.194,69.1483 L454.194,59.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="307.874" x="141.32" y="76.7166">Reads pre-rendered SVGs from .mdd/rendered/.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="292.2651" x="141.32" y="92.0272">If no models are mapped/rendered the canvas</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="294.2329" x="141.32" y="107.3377">shows "No rendered output". Text rendering is</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="307.5439" x="141.32" y="122.6483">realized by SEQ-RENDER-DIAGRAM-PAGE, which</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="222.2568" x="141.32" y="137.9588">consults a populated font database</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="276.5991" x="141.32" y="153.2694">(DOM-FONT-DATABASE) before rasterizing.</text></g><!--link Dev to View--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="19" id="lnk9"><path d="M66.71,362.5483 C83.7,339.6783 107.87,311.7883 135.32,294.0783 C157.63,279.6783 178.5672,270.9427 203.8472,263.4527" fill="none" id="Dev-to-View" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="209.6,261.7483,199.8345,260.4698,204.806,263.1687,202.1071,268.1402,209.6,261.7483" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Browse--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="20" id="lnk10"><path d="M74.57,403.6283 C176.49,410.6983 481.04,426.3183 555.19,367.0783 C591.78,337.8483 550.75,297.7983 585.19,266.0783 C610.31,242.9483 640.3781,233.8433 672.9681,230.1533" fill="none" id="Dev-to-Browse" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="678.93,229.4783,669.5371,226.5162,673.9617,230.0408,670.4372,234.4654,678.93,229.4783" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to PanZoom--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="21" id="lnk11"><path d="M74.53,415.6283 C162.62,451.5883 404.95,534.1983 555.19,427.0783 C588.5,403.3283 554.59,367.2083 585.19,340.0783 C608.6,319.3283 634.8786,310.1631 665.0986,305.5531" fill="none" id="Dev-to-PanZoom" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="671.03,304.6483,661.5297,302.0513,666.0872,305.4023,662.7361,309.9598,671.03,304.6483" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Graph--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="22" id="lnk12"><path d="M74.54,386.1483 C8