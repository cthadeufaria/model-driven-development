<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="608px" preserveAspectRatio="none" style="width:1285px;height:608px;background:#FFFFFF;" version="1.1" viewBox="0 0 1285 608" width="1285px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="5"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="272.3369" x="503.2419" y="23.5352">mdd view &#8212; diagram viewer (current)</text></g><!--cluster mdd-viewer--><g class="cluster" data-qualified-name="mdd-viewer" data-source-line="11" id="ent0003"><rect fill="none" height="251" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="733.32" x="164.01" y="177.0783"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="88.7783" x="486.2808" y="192.6134">mdd-viewer</text></g><!--entity View--><g class="entity" data-qualified-name="mdd-viewer.View" data-source-line="12" id="ent0004"><ellipse cx="299.7649" cy="244.0773" fill="#F1F1F1" rx="119.7449" ry="26.349" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="157.6641" x="220.9328" y="239.8436">View rendered diagram</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="172.3271" x="213.6013" y="256.3319">(shapes AND text legible)</text></g><!--entity Browse--><g class="entity" data-qualified-name="mdd-viewer.Browse" data-source-line="13" id="ent0005"><ellipse cx="758.0431" cy="230.0789" fill="#F1F1F1" rx="78.9031" ry="18.1806" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="127.4697" x="694.3082" y="234.823">Browse model files</text></g><!--entity PanZoom--><g class="entity" data-qualified-name