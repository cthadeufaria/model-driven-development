ly="sans-serif" font-size="14" lengthAdjust="spacing" textLength="126.4785" x="852.2487" y="748.5506">Keep per-file [o/S]</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="111.166" x="859.905" y="765.0389">prompt (no flag)</text></g><!--entity Migrate--><g class="entity" data-qualified-name="mdd init.Migrate" data-source-line="21" id="ent0006"><ellipse cx="391.5997" cy="611.1126" fill="#F1F1F1" rx="124.3797" ry="35.3643" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="185.5137" x="298.8428" y="603.2261">Forward-migrate state files</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="174.2959" x="304.4517" y="619.7144">config / trace / approvals</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="113.7705" x="334.7144" y="636.2027">(never overwrite)</text></g><!--entity Ralph--><g class="entity" data-qualified-name="mdd init.Ralph" data-source-line="22" id="ent0007"><ellipse cx="391.6016" cy="718.1126" fill="#F1F1F1" rx="171.4216" ry="36.6843" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="199.2881" x="291.9575" y="703.9444">Scaffold the Ralph workspace</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="302.3057" x="240.4487" y="720.4327">mdd-ralph skill + PROMPT.md (regenerable)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="252.3828" x="265.4102" y="736.9209">seed PLAN.md once (never overwrite)</text></g><!--entity TestProfile--><g class="entity" data-qualified-name="mdd init.TestProfile" data-source-line="23" id="ent0008"><ellipse cx="391.5982" cy="826.108" fill="#F1F1F1" rx="154.1682" ry="35.9097" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="162.4697" x="310.3634" y="811.3422">Scaffold the test-profile</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="209.7471" x="286.7247" y="827.8305">test: block in config (migrated)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="227.2129" x="277.9918" y="844.3188">test-profile.md doc (regenerable)</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="16" id="ent0002"><ellipse cx="68.3164" cy="688.3683" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M68.3164,696.3683 L68.3164,723.3683 M55.3164,704.3683 L81.3164,704.3683 M68.3164,723.3683 L55.3164,738.3683 M68.3164,723.3683 L81.3164,738.3683" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="124.6328" x="6" y="753.4034">Developer / Agent</text></g><g class="entity" data-qualified-name="GMN15" data-source-line="35" id="ent0016"><path d="M210.66,362.1383 L210.66,418.0699 A0,0 0 0 0 210.66,418.0699 L387.6,418.0699 L391.6,468.7183 L395.6,418.0699 L572.5355,418.0699 A0,0 0 0 0 572.5355,418.0699 L572.5355,372.1383 L562.5355,362.1383 L210.66,362.1383 A0,0 0 0 0 210.66,362.1383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M562.5355,362.1383 L562.5355,372.1383 L572.5355,372.1383 L562.5355,362.1383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="340.1519" x="216.66" y="379.7066">USE-INIT-FORCE: --force = always-Overwrite handler</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="294.6265" x="216.66" y="395.0172">over the regenerable files. The three state files</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="340.8755" x="216.66" y="410.3277">bypass the handler and are migrated, not overwritten.</text></g><g class="entity" data-qualified-name="GMN18" data-source-line="41" id="ent0019"><path d="M191.63,271.1383 L191.63,327.0699 L591.5597,327.0699 L591.5597,281.1383 L581.5597,271.1383 L191.63,271.1383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M581.5597,271.1383 L581.5597,281.1383 L591.5597,281.1383 L581.5597,271.1383" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="378.9297" x="197.63" y="288.7066">USE-INIT-MIGRATE: write_yaml_create_or_migrate upgrades</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="305.8491" x="197.63" y="304.0172">a state file only when on-disk version &lt; current;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="306.1602" x="197.63" y="319.3277">equal = untouched; newer = never downgraded.</text></g><g class="entity" data-qualified-name="GMN21" data-source-line="47" id="ent0022"><path d="M205.74,149.8283 L205.74,236.381 L577.4607,236.381 L577.4607,159.8283 L567.4607,149.8283 L205.74,149.8283" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M567.4607,149.8283 L567.4607,159.8283 L577.4607,159.8283 L567.4607,149.8283" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="311.8223" x="211.74" y="167.3966">USE-INIT-RALPH: init seeds the Ralph workspace.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="327.8818" x="211.74" y="182.7072">mdd-ralph SKILL.md + .mdd/ralph/PROMPT.md are</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="350.7207" x="211.74" y="198.0177">Regenerable (--force overwrites). .mdd/ralph/PLAN.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="320.9756" x="211.74" y="213.3283">is SeededOnce: write_text_create_if_missing, never</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="314.7549" x="211.74" y="228.6388">overwritten (even by --force) and never migrated.</text></g><g class="entity" data-qualified-name="GMN24" data-source-line="55" id="ent0025"><path d="M197.79,43.4883 L197.79,114.7305 L585.4116,114.7305 L585.4116,53.4883 L575.4116,43.4883 L197.79,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M575.4116,43.4883 L575.4116,53.4883 L585.4116,53.4883 L575.4116,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="365.2505" x="203.79" y="61.0566">USE-INIT-TEST-PROFILE: the test: block rides config.yml's</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="361.188" x="203.79" y="76.3672">create-or-forward-migrate path (MddConfig schema v2);</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="366.6216" x="203.79" y="91.6777">test-profile.md is Regenerable. Empty layers =&gt; coverage</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="33.3633" x="203.79" y="106.9883">inert.</text></g><!--link Dev to Force--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="26" id="lnk9"><path d="M88.98,679.5583 C109.65,642.8983 145.56,588.9083 191.63,558.1083 C219.05,539.7783 246.7167,529.2235 278.3467,521.3735" fill="none" id="Dev-to-Force" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="284.17,519.9283,274.4715,518.2139,279.3172,