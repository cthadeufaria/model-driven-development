<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="501px" preserveAspectRatio="none" style="width:1035px;height:501px;background:#FFFFFF;" version="1.1" viewBox="0 0 1035 501" width="1035px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="7"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="536.6416" x="245.8892" y="23.5352">MDD init &#8212; force-overwrite scaffolding + forward-migrate state (current)</text></g><!--cluster mdd init--><g class="cluster" data-qualified-name="mdd init" data-source-line="13" id="ent0003"><rect fill="none" height="228" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="770.2" x="251.22" y="206.4583"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="60.7168" x="605.9616" y="221.9934">mdd init</text></g><!--entity Force--><g class="entity" data-qualified-name="mdd init.Force" data-source-line="14" id="ent0004"><ellipse cx="391.5968" cy="277.4555" fill="#F1F1F1" rx="117.2168" ry="36.1172" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="170.5977" x="306.2979" y="268.4198">Overwrite all regenerable</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="139.4395" x="321.877" y="284.9081">scaffolding (--force)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="127.8867" x="327.6534" y="301.3963">no per-file prompt</text></g><!--entity Prompt--><g class="entity" data-qualified-name="mdd init.Prompt" data-source-line="15" id="ent0005"><ellipse cx="915.488" cy="361.4629" fill="#F1F1F1" rx="89.928" ry="25.6646" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="126.4785" x="852.2487" y="358.9006">Keep per-file [o/S]</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="111.166" x="859.905" y="375.3889">prompt (no flag)</text></g><!--entity Migrate--><g class="entity" data-qualified-name="mdd init.Migrate" data-source-line="16" id="ent0006"><ellipse cx="391.5997" cy="383.4626" fill="#F1F1F1" rx="124.3797" ry="35.3643" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="185.5137" x="298.8428" y="375.5761">Forward-migrate state files</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="174.2959" x="304.4517" y="392.0644">config / trace / approvals</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="113.7705" x="334.7144" y="408.5527">(never overwrite)</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="11" id="ent0002"><ellipse cx="68.3164" cy="353.7083" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M68.3164,361.7083 L68.3164,388.7083 M55.3164,369.7083 L81.3164,369.7083 M68.3164,388.7083 L55.3164,403.7083 M68.3164,388.7083 L81.3164,403.7083" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="124.6328" x="6" y="418.7434">Developer / Agent</text></g><g class="entity" data-qualified-name="GMN11" data-source-line="26" id="ent0012"><path d="M210.66,134.4883 L210.66,190.4199 A0,0 0 0 0 210.66,190.4199 L387.6,190.4199 L391.6,241.0683 L395.6,190.4199 L572.5355,190.4199 A0,0 0 0 0 572.5355,190.4199 L572.5355,144.4883 L562.5355,134.4883 L210.66,134.4883 A0,0 0 0 0 210.66,134.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M562.5355,134.4883 L562.5355,144.48