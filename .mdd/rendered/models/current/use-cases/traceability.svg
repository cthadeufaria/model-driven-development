<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="518px" preserveAspectRatio="none" style="width:1097px;height:518px;background:#FFFFFF;" version="1.1" viewBox="0 0 1097 518" width="1097px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="10"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="371.834" x="359.4727" y="23.5352">MDD traceability + freshness &#8212; use cases (current)</text></g><!--cluster mdd toolchain--><g class="cluster" data-qualified-name="mdd toolchain" data-source-line="16" id="ent0003"><rect fill="none" height="212" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="782.29" x="258.34" y="252.4483"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="103.4756" x="597.7472" y="267.9834">mdd toolchain</text></g><!--entity TraceParity--><g class="entity" data-qualified-name="mdd toolchain.TraceParity" data-source-line="17" id="ent0004"><ellipse cx="395.1076" cy="314.4518" fill="#F1F1F1" rx="120.7676" ry="26.5535" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="153.9043" x="318.1554" y="309.6103">Gate code&lt;-&gt;diagram</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="180.373" x="304.921" y="326.0985">traceability (review pass 3)</text></g><!--entity Freshness--><g class="entity" data-qualified-name="mdd toolchain.Freshness" data-source-line="18" id="ent0005"><ellipse cx="395.1087" cy="412.4503" fill="#F1F1F1" rx="115.1887" ry="36.012" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="168.1025" x="311.0575" y="403.5731">Check whether diagrams</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="155.2646" x="317.4764" y="420.0614">have drifted from code</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="123.1084" x="333.5545" y="436.5496">(mdd map-status)</text></g><!--entity VerifyLink--><g class="entity" data-qualified-name="mdd toolchain.VerifyLink" data-source-line="19" id="ent0006"><ellipse cx="901.1795" cy="364.4482" fill="#F1F1F1" rx="123.4495" ry="27.0899" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="180.6328" x="810.8631" y="361.4978">Verify source_links resolve</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="170.3037" x="816.0276" y="377.9861">to real symbols (validate)</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="14" id="ent0002"><ellipse cx="68.3164" cy="382.7083" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M68.3164,390.7083 L68.3164,417.7083 M55.3164,398.7083 L81.3164,398.7083 M68.3164,417.7083 L55.3164,432.7083 M68.3164,417.7083 L81.3164,432.7083" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="124.6328" x="6" y="447.7434">Developer / Agent</text></g><g class="entity" data-qualified-name="GMN12" data-source-line="30" id="ent0013"><path d="M212.12,134.5183 L212.12,236.3816 A0,0 0 0 0 212.12,236.3816 L391.11,236.3816 L395.11,287.4883 L399.11,236.3816 L578.1024,236.3816 A0,0 0 0 0 578.1024,236.3816 L578.1024,144.5183 L568.1024,134.5183 L212.12,134.5183 A0,0 0 0 0 212.12,134.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M568.1024,134.5183 L568.1024,144.5183 L578.1024,144.5183 L568.1024,134.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="344.9824" x="218.12" y="152.0866">Code (USE-TRACE-PARITY): Project::review_traceability</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="317.8906" x="218.12" y="167.3972">in crates/mdd-core/src/lib.rs, folded into review()</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="320.7534" x="218.12" y="182.7077">as pass 3. FORWARD resolves implementable @ids'</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="332.5156" x="218.12" y="198.0183">source_links; REVERSE classifies changed_code(base)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="274.2568" x="218.12" y="213.3288">into bucket A (warn) / B (error). Realized by</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="320.855" x="218.12" y="228.6394">SEQ-TRACE-REVIEW; owned by CMP-TRACE-GATE.</text></g><g class="entity" data-qualified-name="GMN15" data-source-line="39" id="ent0016"><path d="M191.63,43.4883 L191.63,99.4199 L598.5865,99.4199 L598.5865,53.4883 L588.5865,43.4883 L191.63,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M588.5865,43.4883 L588.5865,53.4883 L598.5865,53.4883 L588.5865,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="360.5215" x="197.63" y="61.0566">Code (USE-MAP-FRESHNESS): Project::map_status, run by</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="366.2153" x="197.63" y="76.3672">`mdd map-status`. Reuses traceability::changed_code on</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="385.9565" x="197.63" y="91.6777">the recorded source_revision. Realized by SEQ-MAP-STATUS.</text></g><g class="entity" data-qualified-name="GMN18" data-source-line="45" id="ent0019"><path d="M719.59,164.8283 L719.59,236.0705 A0,0 0 0 0 719.59,236.0705 L897.18,236.0705 L901.18,336.9083 L905.18,236.0705 L1082.7795,236.0705 A0,0 0 0 0 1082.7795,236.0705 L1082.7795,174.8283 L1072.7795,164.8283 L719.59,164.8283 A0,0 0 0 0 719.59,164.8283" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1072.7795,164.8283 L1072.7795,174.8283 L1082.7795,174.8283 L1072.7795,164.8283" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="340.4756" x="725.59" y="182.3966">Code (USE-VERIFY-SOURCE-LINK): validate_inner calls</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="338.4253" x="725.59" y="197.7072">Project::resolve_source_link per source_link; dangling</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="342.1895" x="725.59" y="213.0177">link -&gt; error. Realized by SEQ-TRACE-REVIEW (shared</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="104.4189" x="725.59" y="228.3283">resolution path).</text></g><!--link Dev to TraceParity--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="22" id="lnk7"><path d="M130.91,382.3583 C150.05,373.7983 171.44,365.0283 191.63,358.4483 C226.18,347.1983 259.1023,339.1836 293.4323,332.1436" fill="none" id="Dev-to-TraceParity" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="299.31,330.9383,289.6899,328.8278,294.4119,331.9427,291.297,336.6647,299.31,330.9383" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Freshness--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line