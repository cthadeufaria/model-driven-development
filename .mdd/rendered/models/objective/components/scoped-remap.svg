" width="4" x="828.6987" y="203.4683"/><rect fill="#F1F1F1" height="2" style="stroke:#181818;stroke-width:0.5;" width="4" x="828.6987" y="207.4683"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="107.6387" x="705.81" y="230.0034">/mdd-map skill</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="119.8887" x="705.81" y="246.4917">(CMP-MAP-SKILL)</text></g><!--entity Cycle--><g class="entity" data-qualified-name="Cycle" data-source-line="19" id="ent0009"><rect fill="#F1F1F1" height="62.9766" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="248.7148" x="524.4" y="49.7383"/><rect fill="#F1F1F1" height="10" style="stroke:#181818;stroke-width:0.5;" width="15" x="753.1148" y="54.7383"/><rect fill="#F1F1F1" height="2" style="stroke:#181818;stroke-width:0.5;" width="4" x="751.1148" y="56.7383"/><rect fill="#F1F1F1" height="2" style="stroke:#181818;stroke-width:0.5;" width="4" x="751.1148" y="60.7383"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="111.5283" x="539.4" y="83.2734">/mdd-cycle skill</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="208.7148" x="539.4" y="99.7617">(CMP-CYCLE-ORCHESTRATOR)</text></g><g class="entity" data-qualified-name="GMN18" data-source-line="31" id="ent0019"><path d="M685.32,488.2183 L685.32,544.1499 A0,0 0 0 0 685.32,544.1499 L1178.2048,544.1499 A0,0 0 0 0 1178.2048,544.1499 L1178.2048,498.2183 L1168.2048,488.2183 L847.52,488.2183 L573.42,403.9983 L839.52,488.2183 L685.32,488.2183 A0,0 0 0 0 685.32,488.2183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1168.2048,488.2183 L1168.2048,498.2183 L1178.2048,498.2183 L1168.2048,488.2183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="346.8994" x="691.32" y="505.7866">Pure inversion + union; no execution. full_remap when</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="409.3984" x="691.32" y="521.0972">any touched file has no source_link. Reuses CMP-TRACE-ENGINE</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="471.8848" x="691.32" y="536.4077">path matching &#8212; no new git/syn machinery. Realized by SEQ-MAP-SCOPE.</text></g><g class="entity" data-qualified-name="GMN21" data-source-line="37" id="ent0022"><path d="M638.88,336.4483 L638.88,407.6905 L1044.6432,407.6905 L1044.6432,346.4483 L1034.6432,336.4483 L638.88,336.4483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1034.6432,336.4483 L1034.6432,346.4483 L1044.6432,346.4483 L1034.6432,336.4483" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="350.6318" x="644.88" y="354.0166">Executes: re-derive only affected_files, leave the rest of</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="378.8916" x="644.88" y="369.3272">current/ byte-identical (ids/refs preserved by construction).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="384.7632" x="644.88" y="384.6377">full_remap -&gt; fall back to whole-tree map. mdd validate still</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="277.8496" x="644.88" y="399.9483">runs whole-tree afterward as the safety net.</text></g><!--link Dev to Cli--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="21" id="lnk10"><path d="M281.98,119.8883 C279.75,135.5683 280.43,153.1783 289.76,166.4683 C305.87,189.4483 325.9401,201.8245 352.4501,210.6945" fill="none" id="Dev-to-Cli" style="stroke:#181818;stroke-width