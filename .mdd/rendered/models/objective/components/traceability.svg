>syn + proc-macro2</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="110.8311" x="936.76" y="702.9717">(span-locations)</text></g><g class="entity" data-qualified-name="GMN20" data-source-line="35" id="ent0021"><path d="M1129.68,641.1583 L1129.68,727.711 L1550.5252,727.711 L1550.5252,651.1583 L1540.5252,641.1583 L1129.68,641.1583" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1540.5252,641.1583 L1540.5252,651.1583 L1550.5252,651.1583 L1540.5252,641.1583" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="277.8115" x="1135.68" y="658.7266">Single language (Rust) -&gt; syn, not a full LSP</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.8281" x="1135.68" y="674.0372">client. proc-macro2 span-locations gives line</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="298.2954" x="1135.68" y="689.3477">spans without running a language server. Swap</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="250.0151" x="1135.68" y="704.6583">to a real LSP client only if the repo goes</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="399.8452" x="1135.68" y="719.9688">polyglot. Realized by SEQ-TRACE-REVIEW + SEQ-MAP-STATUS.</text></g><g class="entity" data-qualified-name="GMN23" data-source-line="43" id="ent0024"><path d="M409.15,492.9183 L409.15,564.1605 A0,0 0 0 0 409.15,564.1605 L751.0621,564.1605 A0,0 0 0 0 751.0621,564.1605 L751.0621,502.9183 L741.0621,492.9183 L583.41,492.9183 L577.89,416.2883 L575.41,492.9183 L409.15,492.9183 A0,0 0 0 0 409.15,492.9183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M741.0621,492.9183 L741.0621,502.9183 L751.0621,502.9183 L741.0621,492.9183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="307.4678" x="415.15" y="510.4866">Mirrors how security parity was added as pass 2:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="284.8638" x="415.15" y="525.7972">deterministic verdict in Rust so it can BLOCK;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="320.9121" x="415.15" y="541.1077">the /mdd-review skill (Bucket C) owns the reaction</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="299.8696" x="415.15" y="556.4183">(author source_link, loop to implement, pause).</text></g><!--link Dev to Cli--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="24" id="lnk11"><path d="M733.11,119.8783 C733.11,143.6683 733.11,168.0083 733.11,190.3183" fill="none" id="Dev-to-Cli" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="733.11,196.3183,737.11,187.3183,733.11,191.3183,729.11,187.3183,733.11,196.3183" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="193.8257" x="734.11" y="163.0366">mdd review / mdd map-status</text></g><!--link Cli to Gate--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="25" id="lnk12"><path d="M700.4,259.6083 C676.64,281.8883 648.6672,308.1046 623.0672,332.1046" fill="none" id="Cli-to-Gate" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="618.69,336.2083,627.9916,332.971,622.3377,332.7886,622.5201,327.1347,618.69,336.2083" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="48.7627" x="665.45" y="303.0166">review()</te