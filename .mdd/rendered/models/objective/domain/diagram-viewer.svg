t-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="167.5762" x="998.41" y="110.5134">loaded : Option&lt;String&gt;</text><g data-visibility-modifier="PUBLIC_FIELD"><ellipse cx="989.41" cy="123.2107" fill="none" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="98.3828" x="998.41" y="127.0017">source : String</text><line style="stroke:#181818;stroke-width:0.5;" x1="979.41" x2="1170.9862" y1="133.9548" y2="133.9548"/></g><g class="entity" data-qualified-name="GMN9" data-source-line="44" id="ent0010"><path d="M577.23,413.6183 L577.23,469.5499 A0,0 0 0 0 577.23,469.5499 L883.1826,469.5499 A0,0 0 0 0 883.1826,469.5499 L883.1826,423.6183 L873.1826,413.6183 L734.2,413.6183 L730.2,343.0883 L726.2,413.6183 L577.23,413.6183 A0,0 0 0 0 577.23,413.6183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M873.1826,413.6183 L873.1826,423.6183 L883.1826,423.6183 L873.1826,413.6183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="277.9131" x="583.23" y="431.1866">Populated once with the host's system fonts</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="284.9526" x="583.23" y="446.4972">before the first parse/render. Constrained by</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="171.6724" x="583.23" y="461.8077">OCL-FONTDB-POPULATED.</text></g><g class="entity" data-qualified-name="GMN12" data-source-line="50" id="ent0013"><path d="M158.67,243.0983 L158.67,344.9616 A0,0 0 0 0 158.67,344.9616 L599.7388,344.9616 A0,0 0 0 0 599.7388,344.9616 L599.7388,253.0983 L589.7388,243.0983 L341.66,243.0983 L268.67,158.8683 L333.66,243.0983 L158.67,243.0983 A0,0 0 0 0 158.67,243.0983" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M589.7388,243.0983 L589.7388,253.0983 L599.7388,253.0983 L589.7388,243.0983" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="295.6357" x="164.67" y="260.6666">Source paints sourceText (read-only); Diagram</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="289.5864" x="164.67" y="275.9772">paints the synthesized constraints SVG on the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="262.2471" x="164.67" y="291.2877">shared canvas. subMode is exactly one of</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.1729" x="164.67" y="306.5983">{Source, Diagram}; Diagram requires the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.4224" x="164.67" y="321.9088">rendered SVG to exist, else a placeholder</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="420.0688" x="164.67" y="337.2194">(OCL-OCL-VIEW-SUBMODE, OCL-OCL-DIAGRAM-NEEDS-RENDER).</text></g><g class="entity" data-qualified-name="GMN15" data-source-line="59" id="ent0016"><path d="M860.89,235.4383 L860.89,352.6121 A0,0 0 0 0 860.89,352.6121 L1289.5047,352.6121 A0,0 0 0 0 1289.5047,352.6121 L1289.5047,245.4383 L1279.5047,235.4383 L1079.2,235.4383 L1075.2,142.4183 L1071.2,235.4383 L860.89,235.4383 A0,0 0 0 0 860.89,235.4383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1279.5047,235.4383 L1279.5047,245.4383 L1289.5047,245.4383 L1279.5047,235.4383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="310.4512" x="866.89" y="253.0066">Backs the central-panel "Source" toggle (between</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="288.501" x="866.89" y="268.3172">"Diagram" and "Diff") for ordinary model files.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="331.3667" x="866.89" y="283.6277">`loaded` is the path whose text is in `source`, read</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="341.7769" x="866.89" y="298.9383">once per selection from disk. When the top-level View</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="323.959" x="866.89" y="314.2488">is Source the viewer paints `source` read-only and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="312" x="866.89" y="329.5594">scrollable, never a rendered artifact &#8212; the Source</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="407.6147" x="866.89" y="344.8699">view is always self-sufficient (OCL-PUML-SOURCE-NO-RENDER).</text></g><!--reverse link SvgRasterizer to FontDatabase--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="aggregation" data-source-line="40" id="lnk7"><path codeLine="40" d="M730.2,154.4183 C730.2,184.3183 730.2,213.3483 730.2,245.0383" fill="none" id="SvgRasterizer-backto-FontDatabase" style="stroke:#181818;stroke-width:1;"/><polygon fill="none" points="730.2,142.4183,726.2,148.4183,730.2,154.4183,734.2,148.4183,730.2,142.4183" style="stroke:#181818;stroke-width:1;"/><polygon fill="#000000" points="735.2,202.0936,738.1389,193.0485,732.2611,193.0485,735.2,202.0936" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="123.0303" x="744.2" y="202.0066">resolves &lt;text&gt; via</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.2202" x="721.604" y="