ne="35" id="ent0008"><path d="M526.3,235.4383 L526.3,352.6121 A0,0 0 0 0 526.3,352.6121 L940.0168,352.6121 A0,0 0 0 0 940.0168,352.6121 L940.0168,245.4383 L930.0168,235.4383 L649.17,235.4383 L528.53,158.0983 L641.17,235.4383 L526.3,235.4383 A0,0 0 0 0 526.3,235.4383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M930.0168,235.4383 L930.0168,245.4383 L940.0168,245.4383 L930.0168,235.4383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="107.999" x="532.3" y="253.0066">migrate() trigger:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.1743" x="540.5266" y="268.3172">onDiskVersion &lt; schemaVersion -&gt; Migrated</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="236.8184" x="548.7531" y="283.6277">(parse into current struct, defaults fill</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.8091" x="552.8664" y="298.9383">new fields, bump version, write back)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="361.2451" x="540.5266" y="314.2488">onDiskVersion = schemaVersion -&gt; Skipped (untouched)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="384.4902" x="540.5266" y="329.5594">onDiskVersion &gt; schemaVersion -&gt; Skipped (no downgrade)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="305.5635" x="532.3" y="344.8699">Preserves all prior content; no per-version code.</text></g><g class="entity" data-qualified-name="GMN10" data-source-line="45" id="ent0011"><path d="M6,413.6183 L6,546.1027 A0,0 0 0 0 6,546.1027 L406.3232,546.1027 A0,0 0 0 0 406.3232,546.1027 L406.3232,423.6183 L396.3232,413.6183 L210.16,413.6183 L206.16,342.8483 L202.16,413.6183 L6,413.6183 A0,0 0 0 0 6,413.6183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M396.3232,413.6183 L396.3232,423.6183 L406.3232,423.6183 L396.3232,413.6183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="271.5146" x="12" y="431.1866">Regenerable: docs, skills (incl. mdd-ralph),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="326.1489" x="12" y="446.4972">CLAUDE.md/AGENTS.md blocks, SessionStart hook,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="301.7358" x="12" y="461.8077">.mdd/ralph/PROMPT.md -&gt; --force overwrites.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.5107" x="12" y="477.1183">AccumulatingState: config / trace / approvals</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="325.7363" x="12" y="492.4288">-&gt; never overwritten; created or forward-migrated.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="379.3232" x="12" y="507.7394">SeededOnce (DOM-INIT-SEED-ONCE): .mdd/ralph/PLAN.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="285.2002" x="12" y="523.0499">-&gt; created if missing, then never overwritten</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="239.2368" x="12" y="538.3605">(even by --force) and never migrated.</text></g><!--link StateMigration to InitFileClass--><g class="link" data-entity-1="ent0003" data-entity-2="ent0002" data-link-type="dependency" data-source-line="31" id="lnk5"><path codeLine="31" d="M359.5,119.8283 C317.79,132.4083 269.78,153.5483 238.16,188.4383 C224.14,203.9183 217.5912,219.5578 213.1612,239.0278"