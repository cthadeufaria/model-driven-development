d the edges. Strength is</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="290.4624" x="244" y="508.2031">bounded; at strength 0 the canvas is the plain</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="102.7876" x="244" y="523.5137">base placement.</text><g class="message" data-entity-1="part2" data-entity-2="part5" data-source-line="36" id="msg8"><polygon fill="#181818" points="794.3984,553.5664,804.3984,557.5664,794.3984,561.5664,798.3984,557.5664" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="233.6489" x2="800.3984" y1="557.5664" y2="557.5664"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="306.5537" x="240.6489" y="552.8242">paint warped mesh / image with focal magnified</text></g><g class="message" data-entity-1="part5" data-entity-2="part1" data-source-line="37" id="msg9"><polygon fill="#181818" points="68.1592,582.877,58.1592,586.877,68.1592,590.877,64.1592,586.877" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;stroke-dasharray:2,2;" x1="62.1592" x2="805.3984" y1="586.877" y2="586.877"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="204.5278" x="74.1592" y="582.1348">centre bulges, edges curve away</text></g><?plantuml-src RLHTJzim57tFhxZg2-beofwBcAXAko4nO1IgRPg4tFWcCNBio7RwiL-_Qpk1bj6NEhvVvznxha_WKl1qEV-HpQQtg-aoMrmllyr_pOV92LmQBDAdvRo_onPtiwTbi72q-GTH8nZSeyaAmsg4dAaDir18lPt0cba4cpE9K1XTqz5eAU6lflCfSCDAQ9WQWQjG0OCSbVE9n0uv5C9Mk4SmMBC6TE6Tw4DnD6Hrk7EjGLXZeUbFE12MSWbAmCz1QN1QopKpiTQwTKuh2xWJreq7dipT-WLp9pQOMS4nu0LA5QeKEc_jQQwLhz8n6iEZjtIWg1YZ95pOHh9zvaJT0sLD8mK1P0LH2Tb24poCC-8Av9zZJKJ7YHEE6hFmnOWy5woa3bAQKcW5M-6g41wRybevrJtmOPAmt17amHLkKEe6pG2ezVILDCmuaGigw63mdVELm2sQFoh5CAN9PDeqm-0TBSS1iy3OMoZ28n_5CNKOOk1iTHnqrU7l9aEHhyDQhhx6c4VS7GTXsOfkR17yVJmd2R60x4i73oQzTBOLeWIzeRiubwJp8D_PYlmOV