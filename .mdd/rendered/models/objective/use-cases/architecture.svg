<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="279px" preserveAspectRatio="none" style="width:565px;height:279px;background:#FFFFFF;" version="1.1" viewBox="0 0 565 279" width="565px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="4"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="357.0205" x="100.6856" y="23.5352">Track the architectural source of truth (objective)</text></g><!--entity Agent--><g class="entity" data-qualified-name="Agent" data-source-line="7" id="ent0002"><ellipse cx="68.3164" cy="51.4883" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M68.3164,59.4883 L68.3164,86.4883 M55.3164,67.4883 L81.3164,67.4883 M68.3164,86.4883 L55.3164,101.4883 M68.3164,86.4883 L81.3164,101.4883" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="124.6328" x="6" y="116.5234">Developer / Agent</text></g><!--entity Track--><g class="entity" data-qualified-name="Track" data-source-line="8" id="ent0003"><ellipse cx="370.5072" cy="81.2317" fill="#F1F1F1" rx="145.0172" ry="31.4034" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="213.5957" x="263.7093" y="75.4977">Define + track the architectural</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="245.6768" x="247.6688" y="91.986">source of truth (.mdd/architecture/)</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="12" id="ent0006"><path d="M190.63,147.6483 L190.63,264.8221 A0,0 0 0 0 190.63,264.8221 L550.3917,264.8221 A0,0 0 0 0 550.3917,264.8221 L550.3917,157.6483 L540.3917,147.6483 L374.51,147.6483 L370.51,112.8983 L366.51,147.6483 L190.63,147.6483 A0,0 0 0 0 190.63,147.6483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M540.3917,147.6483 L540.3917,157.6483 L550.3917,157.6483 L540.3917,147.6483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="316.9067" x="196.63" y="165.2166">Initially authored by /mdd-kickoff (USE-KICKOFF);</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="278.9351" x="196.63" y="180.5272">thereafter any agent updates the spec on an</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="306.1855" x="196.63" y="195.8377">architectural change. Decisions are append-only</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="298.27" x="196.63" y="211.1483">(supersede, don't rewrite) so history is durable.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="310.3877" x="196.63" y="226.4588">Diffs: git today; a structured mdd arch verb next.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="338.7617" x="196.63" y="241.7694">How-to lives in .mdd/docs/architecture-tracking.md.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="198.1675" x="196.63" y="257.0799">Realized by SEQ-ARCH-TRACK.</text></g><!--link Agent to Track--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="9" id="lnk4"><path d="M130.79,81.2283 C158.24,81.2283 185.84,81.2283 219.08,81.2283" fill="none" id="Agent-to-Track" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="225.08,81.2283,216.08,77.2283,220.08,81.2283,216.08,85.2283,225.08,81.2283" style="stroke:#181818;stroke-width:1;"/></g><?plantuml-src ZLJDRXen4BxlKuou