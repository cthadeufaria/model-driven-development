<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="541px" preserveAspectRatio="none" style="width:1355px;height:541px;background:#FFFFFF;" version="1.1" viewBox="0 0 1355 541" width="1355px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="25"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="312.6553" x="517.8866" y="23.5352">MDD cycle tracking &#8212; use cases (objective)</text></g><!--cluster mdd toolchain + viewer--><g class="cluster" data-qualified-name="mdd toolchain . viewer" data-source-line="31" id="ent0003"><rect fill="none" height="189" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="1128.44" x="175.93" y="283.6683"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="171.5479" x="654.3761" y="299.2034">mdd toolchain + viewer</text></g><!--entity RunCycle--><g class="entity" data-qualified-name="mdd toolchain . viewer.RunCycle" data-source-line="32" id="ent0004"><ellipse cx="295.318" cy="344.6681" fill="#F1F1F1" rx="103.388" ry="26.2198" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="140.1436" x="225.2462" y="341.0289">Run a full MDD cycle</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="142.5703" x="224.0328" y="357.5172">from one description</text></g><!--entity Tree--><g class="entity" data-qualified-name="mdd toolchain . viewer.Tree" data-source-line="33" id="ent0005"><ellipse cx="735.6694" cy="421.6722" fill="#F1F1F1" rx="121.4194" ry="26.6839" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="131.3252" x="670.0068" y="414.951">Browse models in a</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="196.1914" x="637.5737" y="431.4393">directory tree (VSCode-style)</text></g><!--entity Group--><g class="entity" data-qualified-name="mdd toolchain . viewer.Group" data-source-line="34" id="ent0006"><ellipse cx="1177.2314" cy="345.6686" fill="#F1F1F1" rx="96.5014" ry="21.7003" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="167.8496" x="1093.3066" y="350.4127">Group diagrams by cycle</text></g><!--entity Diff--><g class="entity" data-qualified-name="mdd toolchain . viewer.Diff" data-source-line="35" id="ent0007"><ellipse cx="295.3248" cy="431.6708" fill="#F1F1F1" rx="78.2048" ry="25.4525" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="92.2236" x="249.213" y="426.9223">View a cycle's</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="110.4551" x="240.0972" y="443.4106">before/after diff</text></g><!--entity Desc--><g class="entity" data-qualified-name="mdd toolchain . viewer.Desc" data-source-line="36" id="ent0008"><ellipse cx="1177.2318" cy="426.6666" fill="#F1F1F1" rx="111.1418" ry="24.6284" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="174.8496" x="1089.807" y="426.9246">Read a diagram element's</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="76.0771" x="1139.1932" y="443.4128">description</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="29" id="ent0002"><ellipse cx="40.1592" cy="459.9183" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M40.1592,467.9183 L40.1592,494.9183 M27.1592,475.9183 L53.1592,475.9183 M40.1592,494.9183 L27.1592,509.9183 M40.1592,494.9183 L53.1592,509.9183" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="68.3184" x="6" y="524.9534">Developer</text></g><g class="entity" data-qualified-name="GMN16" data-source-line="49" id="ent0017"><path d="M576.32,43.4883 L576.32,267.8359 L895.0314,267.8359 L895.0314,53.4883 L885.0314,43.4883 L576.32,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M885.0314,43.4883 L885.0314,53.4883 L895.0314,53.4883 L885.0314,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="136.8936" x="582.32" y="61.0566">Entry-point selection:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="297.7114" x="582.32" y="76.3672">- description given  -&gt; start at /mdd-generate</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256.1216" x="582.32" y="91.6777">- no description     -&gt; behave exactly as</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.418" x="590.5466" y="106.9883">/mdd-map with no comments does today</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="257.7339" x="582.32" y="122.2988">Then: validate -&gt; implement -&gt; map -&gt;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="257.0547" x="582.32" y="137.6094">validate -&gt; review, looping on mismatch</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="250.9673" x="582.32" y="152.9199">until parity closes. The skill PAUSES and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="239.7891" x="582.32" y="168.2305">asks the user whenever a modeling or</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.3457" x="582.32" y="183.541">implementation decision is genuinely</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="242.6011" x="582.32" y="198.8516">ambiguous (clarification is mandatory,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="276.1929" x="582.32" y="214.1621">never guessed). It owns the cycle boundary:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.3379" x="582.32" y="229.4727">opens the cycle + snapshots the current</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256.9722" x="582.32" y="244.7832">side before, closes + snapshots + writes</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="227.5444" x="582.32" y="260.0938">the diff after /mdd-review matches.</text></g><g class="entity" data-qualified-name="GMN19" data-source-line="66" id="ent0020"><path d="M135.32,196.0383 L135.32,267.2805 L455.32,267.2805 L455.32,206.0383 L445.32,196.0383 L135.32,196.0383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M445.32,196.0383 L445.32,206.0383 L455.32,206.0383 L445.32,196.0383" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="299" x="141.32" y="213.6066">The diff is per current-side diagram, computed</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.2124" x="141.32" y="228.9172">from the cycle's before/ and after/ snapshots</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="240.8809" x="141.32" y="244.2277">under .mdd/cycles/&lt;n&gt;/. Realized by</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="168.1875" x="141.32" y="259.5383">SEQ-RENDER-CYCLE-DIFF.</text></g><g class="entity" data-qualified-name="GMN22" data-source-line="73" id="ent0023"><path d="M1014.03,211.6983 L1014.03,267.6299 L1340.4284,267.6299 L1340.4284,221.6983 L1330.4284,211.6983 L1014.03,211.6983" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1330.4284,211.6983 L1330.4284,221.6983 L1340.4284,221.6983 L1330.4284,211.6983" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="305.3984" x="1020.03" y="229.2666">Per-element @desc text only; shown on element</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="302.7007" x="1020.03" y="244.5772">selection in the MODEL CONTEXT card. Realized</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="152.2612" x="1020.03" y="259.8877">by SEQ-ELEMENT-DESC.</text></g><!--link Dev to RunCycle--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="39" id="lnk9"><path d="M68.56,451.0983 C85.54,429.8283 109.08,404.5783 135.32,388.6683 C157.48,375.2183 178.0408,367.3274 202.8708,360.7374" fill="none" id="Dev-to-RunCycle" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="208.67,359.1983,198.9451,357.6408,203.8373,360.4809,200.9973,365.3731,208.67,359.1983" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Tree--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="40" id="lnk10"><path d="M74.57,490.1583 C145.14,490.8383 314.46,490.4883 455.32,474.6683 C521.42,467.2383 589.4641,454.2099 644.6541,442.3399" fill="none" id="Dev-to-Tree" style="stroke:#181818;stroke-width:1;"/><polygon fi