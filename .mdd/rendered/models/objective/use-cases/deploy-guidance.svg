<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="521px" preserveAspectRatio="none" style="width:1000px;height:521px;background:#FFFFFF;" version="1.1" viewBox="0 0 1000 521" width="1000px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="21"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="430.1582" x="281.7259" y="23.5352">/mdd-deploy deployment guidance &#8212; use cases (objective)</text></g><!--cluster mdd toolchain (utility, outside the parity gate)--><g class="cluster" data-qualified-name="mdd toolchain .utility. outside the parity gate." data-source-line="27" id="ent0003"><rect fill="none" height="215" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="840.38" x="146.23" y="269.0083"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="333.1768" x="399.8316" y="284.5434">mdd toolchain (utility, outside the parity gate)</text></g><!--entity Guide--><g class="entity" data-qualified-name="mdd toolchain .utility. outside the parity gate..Guide" data-source-line="28" id="ent0004"><ellipse cx="312.6657" cy="344.009" fill="#F1F1F1" rx="150.4457" ry="37.0607" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="214.1289" x="205.6013" y="333.5785">Guide an Azure Container Apps</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="180.5029" x="222.4143" y="350.0668">deployment via a diagram,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.0254" x="217.653" y="366.5551">runbook, and generated IaC</text></g><!--entity Dialect--><g class="entity" data-qualified-name="mdd toolchain .utility. outside the parity gate..Dialect" data-source-line="29" id="ent0005"><ellipse cx="794.7173" cy="342.0057" fill="#F1F1F1" rx="175.8873" ry="37.5775" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="233.7959" x="677.8194" y="329.5186">Choose &amp; CONFIRM the IaC dialect</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="227.2061" x="681.1143" y="346.0069">(Bicep XOR Terraform) before any</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="249.0195" x="670.2075" y="362.4952">artifact is written &#8212; no silent default</text></g><!--entity Inspect--><g class="entity" data-qualified-name="mdd toolchain .utility. outside the parity gate..Inspect" data-source-line="30" id="ent0006"><ellipse cx="794.7248" cy="441.0092" fill="#F1F1F1" rx="122.2048" ry="26.841" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.7861" x="720.8317" y="435.2897">Inspect the generated</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.9961" x="699.2267" y="451.7779">deployment diagram as SVG</text></g><!--entity Op--><g class="entity" data-qualified-name="Op" data-source-line="25" id="ent0002"><ellipse cx="36.2559" cy="406.2683" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M36.2559,414.2683 L36.2559,441.2683 M23.2559,422.2683 L49.2559,422.2683 M36.2559,441.2683 L23.2559,456.2683 M36.2559,441.2683 L49.2559,456.2683" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="60.5117" x="6" y="471.3034">Operator</text></g><g class="entity" data-qualified-name="GMN12" data-source-line="41" id="ent0013"><path d="M127.51,43.4883 L127.51,252.5254 A0,0 0 0 0 127.51,252.5254 L308.67,252.5254 L312.67,306.4883 L316.67,252.5254 L497.8342,252.5254 A0,0 0 0 0 497.8342,252.5254 L497.8342,53.4883 L487.8342,43.4883 L127.51,43.4883 A0,0 0 0 0 127.51,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M487.8342,43.4883 L487.8342,53.4883 L497.8342,53.4883 L487.8342,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="338.6157" x="133.51" y="61.0566">v1 target: azure-container-apps (../atlas-ate-server).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="324.6445" x="133.51" y="76.3672">Reads .mdd/models + the target repo READ-ONLY.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="344.5571" x="133.51" y="91.6777">PAUSES with a BLOCKING clarification on ambiguity OR</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="302.3833" x="133.51" y="106.9883">a statically detectable go-live landmine &#8212; same</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="312.2793" x="133.51" y="122.2988">discipline as /mdd-cycle, never a buried runbook</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="342.5259" x="133.51" y="137.6094">STOP note. Writes the deployment diagram + runbook</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="349.3242" x="133.51" y="152.9199">+ SECURE-BY-DEFAULT generated IaC in the confirmed</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="309.5942" x="133.51" y="168.2305">dialect (no store left more network-open than its</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="334.0073" x="133.51" y="183.541">peers; migrations-before-traffic stays a documented</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.9614" x="133.51" y="198.8516">procedural tradeoff); then reports and STOPS.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="274.4917" x="133.51" y="214.1621">NEVER runs az / docker / terraform / brew.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="315.9863" x="133.51" y="229.4727">Diagram stereotypes are DOCUMENTATION ONLY.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.1362" x="133.51" y="244.7832">Realized by SEQ-DEPLOY-GUIDANCE.</text></g><g class="entity" data-qualified-name="GMN15" data-source-line="57" id="ent0016"><path d="M619.12,60.0783 L619.12,161.9416 L970.3314,161.9416 L970.3314,70.0783 L960.3314,60.0783 L619.12,60.0783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M960.3314,60.0783 L960.3314,70.0783 L970.3314,70.0783 L960.3314,60.0783" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="330.2114" x="625.12" y="77.6466">Mandatory &#171;include&#187;: guidance cannot proceed until</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="313.771" x="625.12" y="92.9572">the dialect is explicitly confirmed. One dialect per</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="302.4722" x="625.12" y="108.2677">run (Bicep XOR Terraform). FULL PARITY &#8212; both</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="299.9204" x="625.12" y="123.5783">dialects enforce the identical invariant checklist</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="315.1929" x="625.12" y="138.8888">and secure-by-default posture; only IaC structure</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="284.0513" x="625.12" y="154.1994">differs. Realized by SEQ-DEPLOY-GUIDANCE.</text></g><g class="entity" data-qualified-name="GMN18" data-source-line="66" id="ent0019"><path d="M627.45,197.0383 L627.45,252.9699 L961.9988,252.9699 L961.9988,207.0383 L951.9988,197.0383 L627.45,197.0383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M951.9988,197.0383 L951.9988,207.0383 L961.9988,207.0383 L951.9988,197.0383" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308.4072" x="633.45" y="214.6066">Not a gate. /mdd-validate, /mdd-review and the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="313.5488" x="633.45" y="229.9172">/mdd-cycle parity loop never read .mdd/deploy/.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220.4351" x="633.45" y="245.2277">Realized by SEQ-DEPLOY-INSPECT.</text></g><!--link Op to Guide--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="33" id="lnk7"><path d="M66.82,422.2283 C76.22,418.0683 86.72,413.6483 96.51,410.0083 C133.78,396.1683 169.6615,384.6273 206.3115,373.6673" fill="none" id="Op-to-Guide" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="212.06,371.9483,202.2913,370.6945,207.2696,373.3808,204.5833,378.3592,212.06,371.9483" style="stroke:#181818;stroke-width:1;"/></g><!--link Op to Dialect--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="34" id="lnk8"><path d="M66.85,436.9583 C149.93,439.0883 392.06,441.5183 588.84,406.0083 C591.79,405.4783 638.0661,391.0275 688.9361,