<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="615px" preserveAspectRatio="none" style="width:959px;height:615px;background:#FFFFFF;" version="1.1" viewBox="0 0 959 615" width="959px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="12"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="430.1582" x="261.2153" y="23.5352">/mdd-deploy deployment guidance &#8212; use cases (objective)</text></g><!--cluster mdd toolchain (utility, outside the parity gate)--><g class="cluster" data-qualified-name="mdd toolchain .utility. outside the parity gate." data-source-line="18" id="ent0003"><rect fill="none" height="125" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="772.69" x="142.83" y="421.5683"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="333.1768" x="362.5866" y="437.1034">mdd toolchain (utility, outside the parity gate)</text></g><!--entity Guide--><g class="entity" data-qualified-name="mdd toolchain .utility. outside the parity gate..Guide" data-source-line="19" id="ent0004"><ellipse cx="309.2657" cy="493.569" fill="#F1F1F1" rx="150.4457" ry="37.0607" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="214.1289" x="202.2013" y="483.1385">Guide an Azure Container Apps</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="180.5029" x="219.0143" y="499.6268">deployment via a diagram,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.0254" x="214.253" y="516.1151">runbook, and generated IaC</text></g><!--entity Inspect--><g class="entity" data-qualified-name="mdd toolchain .utility. outside the parity gate..Inspect" data-source-line="20" id="ent0005"><ellipse cx="777.3148" cy="493.5692" fill="#F1F1F1" rx="122.2048" ry="26.841" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.7861" x="703.4217" y="487.8497">Inspect the generated</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.9961" x="681.8167" y="504.3379">deployment diagram as SVG</text></g><!--entity Op--><g class="entity" data-qualified-name="Op" data-source-line="16" id="ent0002"><ellipse cx="36.2559" cy="533.8183" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M36.2559,541.8183 L36.2559,568.8183 M23.2559,549.8183 L49.2559,549.8183 M36.2559,568.8183 L23.2559,583.8183 M36.2559,568.8183 L49.2559,583.8183" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="60.5117" x="6" y="598.8534">Operator</text></g><g class="entity" data-qualified-name="GMN9" data-source-line="29" id="ent0010"><path d="M127.51,43.4883 L127.51,405.6309 A0,0 0 0 0 127.51,405.6309 L305.27,405.6309 L309.27,456.2583 L313.27,405.6309 L491.0359,405.6309 A0,0 0 0 0 491.0359,405.6309 L491.0359,53.4883 L481.0359,43.4883 L127.51,43.4883 A0,0 0 0 0 127.51,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M481.0359,43.4883 L481.0359,53.4883 L491.0359,53.4883 L481.0359,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="196.7012" x="133.51" y="61.0566">v1 supports exactly one target:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="273.7554" x="133.51" y="76.3672">azure-container-apps (../atlas-ate-server).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="291.5859" x="133.51" y="91.6777">Any other target -&gt; "not yet supported", stop.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="334.8135" x="133.51" y="106.9883">Reads .mdd/models components+use-cases and the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272.4351" x="133.51" y="122.2988">target repo (README, Dockerfile, compose,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="304.8906" x="133.51" y="137.6094">.env.example, src) READ-ONLY for topology and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="280.3823" x="133.51" y="152.9199">security invariants. PAUSES with a BLOCKING</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="309.4546" x="133.51" y="168.2305">clarification whenever a topology/security choice</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="309.7656" x="133.51" y="183.541">is genuinely ambiguous OR a go-live landmine is</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="299.6919" x="133.51" y="198.8516">statically detectable (a generated config default</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="322.2959" x="133.51" y="214.1621">contradicting what the shipped code supports, e.g.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="336.3115" x="133.51" y="229.4727">AOAI managed-identity vs an api-key-only server) &#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="292.2588" x="133.51" y="244.7832">same discipline as /mdd-cycle; never a buried</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="342.5259" x="133.51" y="260.0938">runbook STOP note. Writes the deployment diagram +</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="331.7539" x="133.51" y="275.4043">runbook + SECURE-BY-DEFAULT generated infra (no</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="282.2866" x="133.51" y="290.7148">store left more network-open than its peers;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="291.167" x="133.51" y="306.0254">migrations-before-traffic stays a documented</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.9614" x="133.51" y="321.3359">procedural tradeoff); then reports and STOPS.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="212.0244" x="133.51" y="336.6465">It NEVER runs az / docker / brew.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="255.1885" x="133.51" y="351.957">The diagram's &#171;Encrypt&#187;/&#171;ByPassing&#187;/...</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="326.3901" x="133.51" y="367.2676">stereotypes are DOCUMENTATION ONLY &#8212; they are</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="317.9604" x="133.51" y="382.5781">NOT the gated security-marker parity mechanism.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.1362" x="133.51" y="397.8887">Realized by SEQ-DEPLOY-GUIDANCE.</text></g><g class="entity" data-qualified-name="GMN12" data-source-line="55" id="ent0013"><path d="M610.04,349.5983 L610.04,405.5299 A0,0 0 0 0 610.04,405.5299 L773.31,405.5299 L777.31,466.3783 L781.31,405.5299 L944.5888,405.5299 A0,0 0 0 0 944.5888,405.5299 L944.5888,359.5983 L934.5888,349.5983 L610.04,349.5983 A0,0 0 0 0 610.04,349.5983" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M934.5888,349.5983 L934.5888,359.5983 L944.5888,359.5983 L934.5888,349.5983" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308.4072" x="616.04" y="367.1666">Not a gate. /mdd-validate, /mdd-review and the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="313.5488" x="616.04" y="382.4772">/mdd-cycle parity loop never read .mdd/deploy/.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220.4351" x="616.04" y="397.7877">Realized by SEQ-DEPLOY-INSPECT.</text></g><!--link Op to Guide--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="23" id="lnk6"><path d="M66.78,555.9383 C99.7,547.4383 149.0107,534.6989 198.2907,521.9689" fill="none" id="Op-to-Guide" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="204.1,520.4683,194.3856,518.8464,199.2589,521.7188,196.3865,526.5921,204.1,520.4683" style="stroke:#181818;stroke-width:1;"/></g><!--link Op to Inspect--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="24" id="lnk7"><path d="M66.84,564.1883 C139.38,565.3783 331.83,566.4283 491.04,548.5683 C559.46,540.8883 630.1602,527.0479 686.7302,514.5979" fill="none" id="Op-to-Inspect" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="692.59,513.3083,682.9406,511.3362,687.7069,514.383,684.6601,519.1492,692.59,513.3083" style="stroke:#181818;stroke-width:1;"/></g><!--link Guide to Inspect--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="26" id="lnk8"><path d="M459.98,493.5683 C522.92,493.5683 589.