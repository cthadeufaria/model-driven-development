<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="766px" preserveAspectRatio="none" style="width:1030px;height:766px;background:#FFFFFF;" version="1.1" viewBox="0 0 1030 766" width="1030px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="11"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="549.4658" x="236.9421" y="23.5352">MDD init &#8212; force-overwrite scaffolding + forward-migrate state (objective)</text></g><!--cluster mdd init--><g class="cluster" data-qualified-name="mdd init" data-source-line="17" id="ent0003"><rect fill="none" height="337" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="814.71" x="201.64" y="358.7683"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="60.7168" x="578.6366" y="374.3034">mdd init</text></g><!--entity Force--><g class="entity" data-qualified-name="mdd init.Force" data-source-line="18" id="ent0004"><ellipse cx="389.0568" cy="429.7655" fill="#F1F1F1" rx="117.2168" ry="36.1172" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="170.5977" x="303.7579" y="420.7298">Overwrite all regenerable</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="139.4395" x="319.337" y="437.2181">scaffolding (--force)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="127.8867" x="325.1134" y="453.7063">no per-file prompt</text></g><!--entity Prompt--><g class="entity" data-qualified-name="mdd init.Prompt" data-source-line="19" id="ent0005"><ellipse cx="910.428" cy="595.7729" fill="#F1F1F1" rx="89.928" ry="25.6646" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="126.4785" x="847.1887" y="593.2106">Keep per-file [o/S]</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="111.166" x="854.845" y="609.6989">prompt (no flag)</text></g><!--entity Migrate--><g class="entity" data-qualified-name="mdd init.Migrate" data-source-line="20" id="ent0006"><ellipse cx="389.0597" cy="535.7726" fill="#F1F1F1" rx="124.3797" ry="35.3643" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="185.5137" x="296.3028" y="527.8861">Forward-migrate state files</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="174.2959" x="301.9117" y="544.3744">config / trace / approvals</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="113.7705" x="332.1744" y="560.8627">(never overwrite)</text></g><!--entity Ralph--><g class="entity" data-qualified-name="mdd init.Ralph" data-source-line="21" id="ent0007"><ellipse cx="389.0616" cy="642.7726" fill="#F1F1F1" rx="171.4216" ry="36.6843" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="199.2881" x="289.4175" y="628.6044">Scaffold the Ralph workspace</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="302.3057" x="237.9087" y="645.0927">mdd-ralph skill + PROMPT.md (regenerable)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="252.3828" x="262.8702" y="661.5809">seed PLAN.md once (never overwrite)</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="15" id="ent0002"><ellipse cx="68.3164" cy="577.0183" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M68.3164,585.0183 L68.3164,612.0183 M55.3164,593.0183 L81.3164,593.0183 M68.3164,612.0183 L55.3164,627.0183 M68.3164,612.0183 L81.3164,627.0183" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="124.6328" x="6" y="642.0534">Developer / Agent</text></g><g class="entity" data-qualified-name="GMN13" data-source-line="32" id="ent0014"><path d="M191.63,271.1483 L191.63,342.3905 A0,0 0 0 0 191.63,342.3905 L385.06,342.3905 L389.06,393.2483 L393.06,342.3905 L586.4943,342.3905 A0,0 0 0 0 586.4943,342.3905 L586.4943,281.1483 L576.4943,271.1483 L191.63,271.1483 A0,0 0 0 0 191.63,271.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M576.4943,271.1483 L576.4943,281.1483 L586.4943,281.1483 L576.4943,271.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="307.2456" x="197.63" y="288.7166">USE-INIT-FORCE: --force overwrites docs, skills,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="373.8643" x="197.63" y="304.0272">CLAUDE.md/AGENTS.md blocks, and the SessionStart hook</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.7036" x="197.63" y="319.3377">from current templates. The three state files are</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="290.5513" x="197.63" y="334.6483">EXEMPT &#8212; they are migrated, not overwritten.</text></g><g class="entity" data-qualified-name="GMN16" data-source-line="39" id="ent0017"><path d="M205.5,165.1483 L205.5,236.3905 L572.6377,236.3905 L572.6377,175.1483 L562.6377,165.1483 L205.5,165.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M562.6377,165.1483 L562.6377,175.1483 L572.6377,175.1483 L562.6377,165.1483" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="346.1377" x="211.5" y="182.7166">USE-INIT-MIGRATE: state files are upgraded only when</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="345.2681" x="211.5" y="198.0272">on-disk version &lt; current schema version (round-trip,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="345.8711" x="211.5" y="213.3377">content preserved); equal = untouched; newer = never</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237.9102" x="211.5" y="228.6483">downgraded. Independent of --force.</text></g><g class="entity" data-qualified-name="GMN19" data-source-line="46" id="ent0020"><path d="M203.2,43.4883 L203.2,130.041 L574.9207,130.041 L574.9207,53.4883 L564.9207,43.4883 L203.2,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M564.9207,43.4883 L564.9207,53.4883 L574.9207,53.4883 L564.9207,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="311.8223" x="209.2" y="61.0566">USE-INIT-RALPH: init seeds the Ralph workspace.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="327.8818" x="209.2" y="76.3672">mdd-ralph SKILL.md + .mdd/ralph/PROMPT.md are</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="350.7207" x="209.2" y="91.6777">Regenerable (--force overwrites). .mdd/ralph/PLAN.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.5996" x="209.2" y="106.9883">is SeededOnce: created if missing, then never</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="314.7549" x="209.2" y="122.2988">overwritten (even by --force) and never migrated.</text></g><!--link Dev to Force--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="24" id="lnk8"><path d="M98.18,568.0583 C120.73,540.4383 154.41,504.4683 191.63,482.7683 C220.01,466.2183 247.8741,456.1731 279.2641,448.2131" fill="none" id="Dev-to-Force" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="285.08,446.7383,275.3729,445.0732,280.2334,447.9673,277.3393,452.8278,285.08,446.7383" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Prompt--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="25" id="lnk9"><path d="M108.3,645.5083 C130.66,664.9583 160.45,686.5283 191.63,696.7683 C358.37,751.4983 413.01,723.2683 586.5,696.7683 C685.36,681.6683 789.973,644.1911 852.703,619.3011" fill="none" id="Dev-to-Prompt" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="858.28,617.0883,848.4392,616.6895,853.6325,618.9323,851.3897,624.1256,858.28,617.0883" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Migrate--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="26" id="lnk10"><path d="M130.77,593.0783 C175.91,583.0183 232.2934,570.4624 284.2534,558.8924" fill="none" id="Dev-to-Migrate" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="290.11,557.5883,280.4558,555.64,285.2295,558.675,282.1945,563.4488,290.11,557.5883" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Ralph--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="27" id="lnk11"><path d="M130.77,613.7083 C161.08,617.1283 193.128,620.7445 230.558,624.9745" fill="none" id="Dev-to-Ralph" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="236.52,625.6483,228.0261,620.6629,231.5516,625.0868,227.1277,628.6123,236.52,625.6483" style="stroke:#181818;stroke-width:1;"/></g><!--link Force to Prompt--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="29" id="lnk12"><path d="M480.43,452.6683 C513.9,461.5383 552.08,472.1183 586.5,482.7683 C681.68,512.2183 785.1529,549.506 849.0629,573.156" fill="none" id="Force-to-Prompt" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#181818" points="854.69,575.2383,847.6376,568.3634,850.0008,573.503,844.8612,575.8662,854.69,575.2383" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="172.7515" x="617.5" y="490.5166">&#171;extend&#187; (replaces prompt)</text></g><!--link Migrate to GMN16--><g class="link" data-entity-1="ent0006" data-entity-2="ent0017" data-link-type="association" data-source-line="39" id="lnk18"><path d="M265.62,530.6083 C223.96,521.7683 182.59,503.3183 161.13,466.2683 C139.42,428.7683 139.42,308.7683 161.13,271.2683 C171.72,252.9883 187.13,239.1883 205.03,228.8183" fill="none" id="Migrate-GMN16" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/></g><!--link Ralph to GMN19--><g class="link" data-entity-1="ent0007" data-entity-2="ent0020" data-link-type="association" data-source-line="46" id="lnk21"><path d="M233.48,627.0983 C203.78,616.1483 177.03,598.7183 161.13,571.2683 C138.52,532.2283 138.52,204.3083 161.13,165.2683 C171.36,147.6083 185.95,133.8283 202.89,123.0983" fill="none" id="Ralph-GMN19" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/></g><?plantuml-src fLVhRkD45FwVfpZgdpeqJe5VgBkiDhJk4j4s9UcoI1IfKtiIcquynZDk6X0I3y4JyYHyPpo-f9jbkKYL6e_dtB_ldED3UfqbmTj554wlfZVX-Mn-6Wq7X_GwaIP-TZwYWxaCoogdktMIK9Pdbi9mgSjOtf7Lf1zbkIapAqdYrvRcqPleAffFlhg8oCHYkTGgoV8LBJCb8Ks54h6aJMPJNLcogQH2bg5xMvHwNTWJTpY6iUD4n-Ru4_oaOAFBXwNIcn5LQnMAF0brh4PaP5p1-3Q4BEiOKI8BfTlduSXfQwHfyStque8Lyaj3LPx8aiQn4bKYZyr3ffGXACUHJkIJFwbrd5vCtfv5a3sU8CAR1MjPYroiP4BtIiSFkCUYV7SXZSbqlh2Yj9