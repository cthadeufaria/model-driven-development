<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="531px" preserveAspectRatio="none" style="width:1030px;height:531px;background:#FFFFFF;" version="1.1" viewBox="0 0 1030 531" width="1030px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="8"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="549.4658" x="236.9421" y="23.5352">MDD init &#8212; force-overwrite scaffolding + forward-migrate state (objective)</text></g><!--cluster mdd init--><g class="cluster" data-qualified-name="mdd init" data-source-line="14" id="ent0003"><rect fill="none" height="228" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="767.66" x="248.69" y="237.1083"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="60.7168" x="602.1616" y="252.6434">mdd init</text></g><!--entity Force--><g class="entity" data-qualified-name="mdd init.Force" data-source-line="15" id="ent0004"><ellipse cx="389.0568" cy="308.1055" fill="#F1F1F1" rx="117.2168" ry="36.1172" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="170.5977" x="303.7579" y="299.0698">Overwrite all regenerable</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="139.4395" x="319.337" y="315.5581">scaffolding (--force)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="127.8867" x="325.1134" y="332.0463">no per-file prompt</text></g><!--entity Prompt--><g class="entity" data-qualified-name="mdd init.Prompt" data-source-line="16" id="ent0005"><ellipse cx="910.428" cy="392.1129" fill="#F1F1F1" rx="89.928" ry="25.6646" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="126.4785" x="847.1887" y="389.5506">Keep per-file [o/S]</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="111.166" x="854.845" y="406.0389">prompt (no flag)</text></g><!--entity Migrate--><g class="entity" data-qualified-name="mdd init.Migrate" data-source-line="17" id="ent0006"><ellipse cx="389.0597" cy="414.1126" fill="#F1F1F1" rx="124.3797" ry="35.3643" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="185.5137" x="296.3028" y="406.2261">Forward-migrate state files</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="174.2959" x="301.9117" y="422.7144">config / trace / approvals</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="113.7705" x="332.1744" y="439.2027">(never overwrite)</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="12" id="ent0002"><ellipse cx="68.3164" cy="384.3583" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M68.3164,392.3583 L68.3164,419.3583 M55.3164,400.3583 L81.3164,400.3583 M68.3164,419.3583 L55.3164,434.3583 M68.3164,419.3583 L81.3164,434.3583" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="124.6328" x="6" y="449.3934">Developer / Agent</text></g><g class="entity" data-qualified-name="GMN11" data-source-line="27" id="ent0012"><path d="M191.63,149.4883 L191.63,220.7305 A0,0 0 0 0 191.63,220.7305 L385.06,220.7305 L389.06,271.5883 L393.06,220.7305 L586.4943,220.7305 A0,0 0 0 0 586.4943,220.7305 L586.4943,159.4883 L576.4943,149.4883 L191.63,149.4883 A0,0 0 0 0 191.63,149.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M576.4943,149.4883 L576.4943,159.4883 L586.4943,159.4883 L576.4943,149.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="307.2456" x="197.63" y="167.0566">USE-INIT-FORCE: --force overwrites docs, skills,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="373.8643" x="197.63" y="182.3672">CLAUDE.md/AGENTS.md blocks, and the SessionStart hook</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.7036" x="197.63" y="197.6777">from current templates. The three state files are</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="290.5513" x="197.63" y="212.9883">EXEMPT &#8212; they are migrated, not overwritten.</text></g><g class="entity" data-qualified-name="GMN14" data-source-line="34" id="ent0015"><path d="M205.5,43.4883 L205.5,114.7305 L572.6377,114.7305 L572.6377,53.4883 L562.6377,43.4883 L205.5,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M562.6377,43.4883 L562.6377,53.4883 L572.6377,53.4883 L562.6377,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="346.1377" x="211.5" y="61.0566">USE-INIT-MIGRATE: state files are upgraded only when</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="345.2681" x="211.5" y="76.3672">on-disk version &lt; current schema version (round-trip,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="345.8711" x="211.5" y="91.6777">content preserved); equal = untouched; newer = never</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237.9102" x="211.5" y="106.9883">downgraded. Independent of --force.</text></g><!--link Dev to Force--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="20" id="lnk7"><path d="M130.85,385.3683 C150.08,376.9483 171.53,368.1283 191.63,361.1083 C224.98,349.4583 256.4352,340.3362 289.4752,331.6962" fill="none" id="Dev-to-Force" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="295.28,330.1783,285.5608,328.5854,290.4427,331.4433,287.5848,336.3251,295.28,330.1783" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Prompt--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="21" id="lnk8"><path d="M130.87,446.5883 C149.83,454.9883 171.12,462.8583 191.63,467.1083 C431.48,516.8383 717.8435,448.5259 842.5235,412.6859" fill="none" id="Dev-to-Prompt" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="848.29,411.0283,838.5352,409.6704,843.4846,412.4096,840.7453,417.359,848.29,411.0283" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Migrate--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="22" id="lnk9"><path d="M130.77,414.1083 C168.67,414.1083 212.64,414.1083 258.44,414.1083" fill="none" id="Dev-to-Migrate" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="264.44,414.1083,255.44,410.1083,259.44,414.1083,255.44,418.1083,264.44,414.1083" style="stroke:#181818;stroke-width:1;"/></g><!--link Force to Prompt--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="24" id="lnk10"><path d="M493.61,324.8583 C593.18,340.9583 735.557,363.9904 825.527,378.5404" fill="none" id="Force-to-Prompt" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#181818" points="831.45,379.4983,823.204,374.1128,826.5141,378.7,821.9268,382.0102,831.45,379.4983" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" l