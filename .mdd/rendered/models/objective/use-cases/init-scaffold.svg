<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="1059px" preserveAspectRatio="none" style="width:1038px;height:1059px;background:#FFFFFF;" version="1.1" viewBox="0 0 1038 1059" width="1038px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="14"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="549.4658" x="241.1721" y="23.5352">MDD init &#8212; force-overwrite scaffolding + forward-migrate state (objective)</text></g><!--cluster mdd init--><g class="cluster" data-qualified-name="mdd init" data-source-line="20" id="ent0003"><rect fill="none" height="444" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="818.94" x="205.87" y="480.7583"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="60.7168" x="584.9816" y="496.2934">mdd init</text></g><!--entity Force--><g class="entity" data-qualified-name="mdd init.Force" data-source-line="21" id="ent0004"><ellipse cx="393.2868" cy="551.7555" fill="#F1F1F1" rx="117.2168" ry="36.1172" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="170.5977" x="307.9879" y="542.7198">Overwrite all regenerable</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="139.4395" x="323.567" y="559.2081">scaffolding (--force)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="127.8867" x="329.3434" y="575.6963">no per-file prompt</text></g><!--entity Prompt--><g class="entity" data-qualified-name="mdd init.Prompt" data-source-line="22" id="ent0005"><ellipse cx="918.878" cy="797.7629" fill="#F1F1F1" rx="89.928" ry="25.6646" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="126.4785" x="855.6387" y="795.2006">Keep per-file [o/S]</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="111.166" x="863.295" y="811.6889">prompt (no flag)</text></g><!--entity Migrate--><g class="entity" data-qualified-name="mdd init.Migrate" data-source-line="23" id="ent0006"><ellipse cx="393.2897" cy="657.7626" fill="#F1F1F1" rx="124.3797" ry="35.3643" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="185.5137" x="300.5328" y="649.8761">Forward-migrate state files</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="174.2959" x="306.1417" y="666.3644">config / trace / approvals</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="113.7705" x="336.4044" y="682.8527">(never overwrite)</text></g><!--entity Ralph--><g class="entity" data-qualified-name="mdd init.Ralph" data-source-line="24" id="ent0007"><ellipse cx="393.2916" cy="764.7626" fill="#F1F1F1" rx="171.4216" ry="36.6843" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="199.2881" x="293.6475" y="750.5944">Scaffold the Ralph workspace</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="302.3057" x="242.1387" y="767.0827">mdd-ralph skill + PROMPT.md (regenerable)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="252.3828" x="267.1002" y="783.5709">seed PLAN.md once (never overwrite)</text></g><!--entity TestProfile--><g class="entity" data-qualified-name="mdd init.TestProfile" data-source-line="25" id="ent0008"><ellipse cx="393.2882" cy="872.758" fill="#F1F1F1" rx="154.1682" ry="35.9097" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="162.4697" x="312.0534" y="857.9922">Scaffold the test-profile</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="209.7471" x="288.4147" y="874.4805">test: block in config (migrated)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="227.2129" x="279.6818" y="890.9688">test-profile.md doc (regenerable)</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="18" id="ent0002"><ellipse cx="68.3164" cy="735.0183" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M68.3164,743.0183 L68.3164,770.0183 M55.3164,751.0183 L81.3164,751.0183 M68.3164,770.0183 L55.3164,785.0183 M68.3164,770.0183 L81.3164,785.0183" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="124.6328" x="6" y="800.0534">Developer / Agent</text></g><g class="entity" data-qualified-name="GMN15" data-source-line="37" id="ent0016"><path d="M195.86,393.1383 L195.86,464.3805 A0,0 0 0 0 195.86,464.3805 L389.29,464.3805 L393.29,515.2483 L397.29,464.3805 L590.7243,464.3805 A0,0 0 0 0 590.7243,464.3805 L590.7243,403.1383 L580.7243,393.1383 L195.86,393.1383 A0,0 0 0 0 195.86,393.1383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M580.7243,393.1383 L580.7243,403.1383 L590.7243,403.1383 L580.7243,393.1383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="307.2456" x="201.86" y="410.7066">USE-INIT-FORCE: --force overwrites docs, skills,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="373.8643" x="201.86" y="426.0172">CLAUDE.md/AGENTS.md blocks, and the SessionStart hook</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="303.7036" x="201.86" y="441.3277">from current templates. The three state files are</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="290.5513" x="201.86" y="456.6383">EXEMPT &#8212; they are migrated, not overwritten.</text></g><g class="entity" data-qualified-name="GMN18" data-source-line="44" id="ent0019"><path d="M209.72,287.1383 L209.72,358.3805 L576.8577,358.3805 L576.8577,297.1383 L566.8577,287.1383 L209.72,287.1383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M566.8577,287.1383 L566.8577,297.1383 L576.8577,297.1383 L566.8577,287.1383" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="346.1377" x="215.72" y="304.7066">USE-INIT-MIGRATE: state files are upgraded only when</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="345.2681" x="215.72" y="320.0172">on-disk version &lt; current schema version (round-trip,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="345.8711" x="215.72" y="335.3277">content preserved); equal = untouched; newer = never</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237.9102" x="215.72" y="350.6383">downgraded. Independent of --force.</text></g><g class="entity" data-qualified-name="GMN21" data-source-line="51" id="ent0022"><path d="M207.43,165.4883 L207.43,252.041 L579.1507,252.041 L579.1507,175.4883 L569.1507,165.4883 L207.43,165.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M569.1507,165.4883 L569.1507,175.4883 L579.1507,175.4883 L569.1507,165.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="311.8223" x="213.43" y="183.0566">USE-INIT-RALPH: init seeds the Ralph workspace.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="327.8818" x="213.43" y="198.3672">mdd-ralph SKILL.md + .mdd/ralph/PROMPT.md are</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="350.7207" x="213.43" y="213.6777">Regenerable (--force overwrites). .mdd/ralph/PLAN.md</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.5996" x="213.43" y="228.9883">is SeededOnce: created if missing, then never</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="314.7549" x="213.43" y="244.2988">overwritten (even by --force) and never migrated.</text></g><g class="entity" data-qualified-name="GMN24" data-source-line="59" id="ent0025"><path d="M191.63,43.4883 L191.63,130.041 L594.9493,130.041 L594.9493,53.4883 L584.9493,43.4883 L191.63,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M584.9493,43.4883 L584.9493,53.4883 L594.9493,53.4883 L584.9493,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="365.2505" x="197.63" y="61.0566">USE-INIT-TEST-PROFILE: the test: block rides config.yml's</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="382.3193" x="197.63" y="76.3672">AccumulatingState path (created or forward-migrated, never</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="332.2173" x="197.63" y="91.6777">overwritten); test-profile.md is Regenerable (--force</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="359.9121" x="197.63" y="106.9883">overwrites). Cycle A seeds gate=error + no layers, so the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="351.7554" x="197.63" y="122.2988">coverage rule stays advisory until layers are configured.</text></g><!--link Dev to Force--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="28" id="lnk9"><path d="M88.97,726.1983 C109.62,689.5183 145.53,635.5083 191.63,604.7583 C219.44,586.2183 247.6023,575.5857 279.6523,567.7357" fill="none" id="Dev-to-Force" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="285.48,566.3083,275.7868,564.5642,280.6235,567.4978,277.69,572.3345,285.48,566.3083" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Prompt--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="29" id="lnk10"><path d="M85.9,803.3583 C105.02,842.3683 140.53,900.4083 191.63,925.7583 C431.62,1044.8283 759.2494,886.6319 872.8294,823.8219" fill="none" id="Dev-to-Prompt" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="878.08,820.9183,868.2683,821.7733,873.7045,823.338,872.1398,828.7741,878.08,820.9183" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Migrate--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="30" id="lnk11"><path d="M131.09,735.2283 C150.25,726.6883 171.59,717.7883 191.63,710.7583 C225.04,699.0583 256.5476,690.0167 289.8576,681.4867" fill="none" id="Dev-to-Migrate" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="295.67,679.9983,285.959,678.356,290.8263,681.2387,287.9436,686.1059,295.67,679.9983" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Ralph--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="31" id="lnk12"><path d="M130.83,764.7583 C157,764.7583 182.95,764.7583 215.4,764.7583" fill="none" id="Dev-to-Ralph" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="221.4,764.7583,212.4,760.7583,216.4,764.7583,212.4,768.7583,221.4,764.7583" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to TestProfile--><g class="link" data-entity-1="ent0002" data-entity-2="ent0008" data-link-type="dependency" data-source-line="32" id="lnk13"><path d="M131.12,794.2383 C150.27,802.7783 171.6,811.6883 191.63,818.7583 C221.31,829.2383 248.2741,837.2965 278.5641,845.4065" fill="none" id="Dev-to-TestProfile" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="284.36,846.9583,276.7008,840.7667,279.5301,845.6651,274.6317,848.4945,284.36,846.9583" style="stroke:#181818;stroke-width:1;"/></g><!--link Force to Prompt--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="34" id="lnk14"><path d="M491.8,571.6883 C525.19,580.0283 562.32,591.0283 594.95,604.7583 C707.52,652.1483 823.0483,729.8139 879.7883,770.1139" fill="none" id="Force-to-Prompt" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#181818" points="884.68,773.5883,879.6587,765.1156,880.6036,770.693,875.0262,771.6379,884.68,773.5883" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="172.7515" x="625.95" y="618.0166">&#171;extend&#187; (replaces prompt)</text></g><!--link Migrate to GMN18--><g class="link" data-entity-1="ent0006" data-entity-2="ent0019" data-link-type="association" data-source-line="44" id="lnk20"><path d="M269.37,653.6483 C226.31,645.0483 183.27,626.4883 161.13,588.2583 C139.42,550.7683 139.42,430.7583 161.13,393.2583 C172.59,373.4883 189.61,358.9283 209.33,348.2583" fill="none" id="Migrate-GMN18" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/></g><!--link Ralph to GMN21--><g class="link" data-entity-1="ent0007" data-entity-2="ent0022" data-link-type="association" data-source-line="51" id="lnk23"><path d="M235.68,750.0983 C205