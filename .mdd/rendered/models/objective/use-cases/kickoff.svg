<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="295px" preserveAspectRatio="none" style="width:460px;height:295px;background:#FFFFFF;" version="1.1" viewBox="0 0 460 295" width="460px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="6"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="341.1338" x="56.0609" y="23.5352">MDD greenfield kickoff &#8212; use cases (objective)</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="9" id="ent0002"><ellipse cx="40.1592" cy="55.6883" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M40.1592,63.6883 L40.1592,90.6883 M27.1592,71.6883 L53.1592,71.6883 M40.1592,90.6883 L27.1592,105.6883 M40.1592,90.6883 L53.1592,105.6883" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="68.3184" x="6" y="120.7234">Developer</text></g><!--entity Kickoff--><g class="entity" data-qualified-name="Kickoff" data-source-line="11" id="ent0003"><ellipse cx="289.7942" cy="85.4265" fill="#F1F1F1" rx="146.5242" ry="41.9382" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="193.5186" x="193.035" y="69.6558">Kick off a greenfield project:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="221.2998" x="179.1443" y="86.1441">interview -&gt; signed-off brief -&gt;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="243.0996" x="168.2444" y="102.6324">full objective -&gt; Ralph-ready PLAN,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="64.627" x="257.4808" y="119.1207">then stop</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="16" id="ent0006"><path d="M134.32,162.8483 L134.32,280.0221 A0,0 0 0 0 134.32,280.0221 L445.2555,280.0221 A0,0 0 0 0 445.2555,280.0221 L445.2555,172.8483 L435.2555,162.8483 L293.79,162.8483 L289.79,127.8583 L285.79,162.8483 L134.32,162.8483 A0,0 0 0 0 134.32,162.8483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M435.2555,162.8483 L435.2555,172.8483 L445.2555,172.8483 L435.2555,162.8483" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="260.7871" x="140.32" y="180.4166">Utility front door (sibling of /mdd-ralph),</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="278.8906" x="140.32" y="195.7272">outside the parity gate: opens no cycle. Two</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.4282" x="140.32" y="211.0377">human gates &#8212; the brief sign-off (before any</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="289.9355" x="140.32" y="226.3483">model is generated) and the final stop (before</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="255.2266" x="140.32" y="241.6588">Ralph runs). Never auto-launches Ralph.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="280.6807" x="140.32" y="256.9694">Realized by SEQ-KICKOFF; each PLAN item it</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="205.8735" x="140.32" y="272.2799">writes feeds USE-REALIZE-SLICE.</text></g><!--link Dev to Kickoff--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="13" id="lnk4"><path d="M74.81,85.4283 C93.19