 y="91.6777">Realized by SEQ-SESSION-BRIEF; owned by CMP-SESSION-CLI</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="124.5347" x="233.1" y="106.9883">+ CMP-INIT-HOOK.</text></g><g class="entity" data-qualified-name="GMN12" data-source-line="31" id="ent0013"><path d="M755.99,43.4883 L755.99,114.7305 A0,0 0 0 0 755.99,114.7305 L945.66,114.7305 L949.66,165.5983 L953.66,114.7305 L1143.3323,114.7305 A0,0 0 0 0 1143.3323,114.7305 L1143.3323,53.4883 L1133.3323,43.4883 L755.99,43.4883 A0,0 0 0 0 755.99,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1133.3323,43.4883 L1133.3323,53.4883 L1143.3323,53.4883 L1133.3323,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="351.127" x="761.99" y="61.0566">USE-DIAGRAMS-FIRST: the entrypoint directive encodes</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="366.3423" x="761.99" y="76.3672">fresh -&gt; read + follow source_links / stale -&gt; /mdd-map</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="356.2622" x="761.99" y="91.6777">the drifted area first. Realized by SEQ-DIAGRAMS-FIRST;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256.5278" x="761.99" y="106.9883">owned by CMP-ENTRYPOINT-DIRECTIVE.</text></g><!--link Agent to Brief--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="19" id="lnk6"><path d="M166.17,255.1983 C221.17,244.1283 288.358,230.6221 343.658,219.4921" fill="none" id="Agent-to-Brief" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="349.54,218.3083,339.9277,216.1627,344.6383,219.2948,341.5062,224.0054,349.54,218.3083" style="stroke:#181818;stroke-width:1;"/></g><!--link Agent to First-