ll="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="135.3516" x="775.4477" y="230.0202">Emit a deterministic</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="116.8262" x="784.7104" y="246.5085">ordered test plan</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="107.0166" x="789.6152" y="262.9968">(mdd test-plan)</text></g><!--entity Green--><g class="entity" data-qualified-name="mdd test tooling.Green" data-source-line="20" id="ent0006"><ellipse cx="1265.6711" cy="239.445" fill="#F1F1F1" rx="97.3811" ry="34.7367" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.1025" x="1192.1198" y="232.5455">Run the plan at close,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="94.3906" x="1218.4758" y="249.0337">gate on green</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="68.4414" x="1231.4504" y="265.522">(test.gate)</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="15" id="ent0002"><ellipse cx="68.3164" cy="210.7083" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M68.3164,218.7083 L68.3164,245.7083 M55.3164,226.7083 L81.3164,226.7083 M68.3164,245.7083 L55.3164,260.7083 M68.3164,245.7083 L81.3164,260.7083" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="124.6328" x="6" y="275.7434">Developer / Agent</text></g><g class="entity" data-qualified-name="GMN12" data-source-line="31" id="ent0013"><path d="M191.63,43.4883 L191.63,99.4199 A0,0 0 0 0 191.63,99.4199 L400.21,99.4199 L404.21,204.8083 L408.21,99.4199 L616.7789,99.4199 A0,0 0 0 0 616.7789,99.4199 L616.7789,53.4883 L606.7