<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="485px" preserveAspectRatio="none" style="width:640px;height:485px;background:#FFFFFF;" version="1.1" viewBox="0 0 640 485" width="640px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="9"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="437.4795" x="97.8755" y="23.5352">MDD diagram-driven tests &#8212; structural coverage (objective)</text></g><!--cluster mdd validate--><g class="cluster" data-qualified-name="mdd validate" data-source-line="15" id="ent0003"><rect fill="none" height="234" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="260.23" x="277.82" y="237.1083"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="93.7686" x="361.0507" y="252.6434">mdd validate</text></g><!--entity Coverage--><g class="entity" data-qualified-name="mdd validate.Coverage" data-source-line="16" id="ent0004"><ellipse cx="407.9297" cy="419.1054" fill="#F1F1F1" rx="110.2397" ry="36.3571" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="159.0244" x="328.4175" y="409.7105">Every impl-bearing @id</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="129.7393" x="343.0601" y="426.1988">has a linked test of</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="125.2207" x="345.3194" y="442.6871">the expected layer</text></g><!--entity Membership--><g class="entity" data-qualified-name="mdd validate.Membership" data-source-line="17" id="ent0005"><ellipse cx="407.9266" cy="310.1115" fill="#F1F1F1" rx="114.1166" ry="37.6032" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="158.8398" x="328.5067" y="298.8988">Test layer + framework</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="133.4375" x="341.2078" y="315.387">are members of the</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="151.8604" x="331.9964" y="331.8753">configured test profile</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="13" id="ent0002"><ellipse cx="68.3164" cy="335.3683" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M68.3164,343.3683 L68.3164,370.3683 M55.3164,351.3683 L81.3164,351.3683 M68.3164,370.3683 L55.3164,385.3683 M68.3164,370.3683 L81.3164,385.3683" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="124.6328" x="6" y="400.4034">Developer / Agent</text></g><g class="entity" data-qualified-name="GMN8" data-source-line="24" id="ent0009"><path d="M190.63,149.4883 L190.63,220.7305 L625.2306,220.7305 L625.2306,159.4883 L615.2306,149.4883 L190.63,149.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M615.2306,149.4883 L615.2306,159.4883 L625.2306,159.4883 L615.2306,149.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="356.9478" x="196.63" y="167.0566">USE-TEST-COVERAGE: structural existence/linkage only.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="346.1123" x="196.63" y="182.3672">Runs only when layers are configured; then BLOCKS on</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="366.958" x="196.63" y="197.6777">gate=error, WARNS on gate=warn. Inert with no layers, so</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="413.6006" x="196.63" y="212.9883">a profile-less repo stays green. Realized by SEQ-TEST-VALIDATE.</text></g><g class="entity" data-qualified-name="GMN11" data-source-line="31" id="ent0012"><path d="M207.81,43.4883 L207.81,114.7305 L608.0507,114.7305 L608.0507,53.4883 L598.0507,43.4883 L207.81,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M598.0507,43.4883 L598.0507,53.4883 L608.0507,53.4883 L598.0507,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="379.2407" x="213.81" y="61.0566">USE-TEST-LAYER-MEMBERSHIP: layer/framework must be in</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="319.0205" x="213.81" y="76.3672">test.layers (when configured) &#8212; replaces the silent</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="359.5757" x="213.81" y="91.6777">drop of non-playwright UI frameworks. Skipped when no</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="329.4814" x="213.81" y="106.9883">layers are configured. The `test:` block must parse.</text></g><!--link Dev to Coverage--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="20" id="lnk6"><path d="M130.85,374.9483 C180.3,382.8583 244.7954,393.1698 302.1354,402.3498" fill="none" id="Dev-to-Coverage" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="308.06,403.2983,299.8055,397.9258,303.1229,402.5079,298.5408,405.8252,308.06,403.2983" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Membership--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="21" id="lnk7"><path d="M130.85,355.0883 C1