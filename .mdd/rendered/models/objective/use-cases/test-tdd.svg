<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="515px" preserveAspectRatio="none" style="width:1079px;height:515px;background:#FFFFFF;" version="1.1" viewBox="0 0 1079 515" width="1079px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="13"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="396.8877" x="337.8042" y="23.5352">MDD diagram-driven tests &#8212; red-first TDD (objective)</text></g><!--cluster TDD cycle--><g class="cluster" data-qualified-name="TDD cycle" data-source-line="19" id="ent0003"><rect fill="none" height="321" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="757.38" x="228.3" y="131.1083"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="72.2969" x="570.8416" y="146.6434">TDD cycle</text></g><!--entity Red--><g class="entity" data-qualified-name="TDD cycle.Red" data-source-line="20" id="ent0004"><ellipse cx="375.2989" cy="305.1068" fill="#F1F1F1" rx="92.6989" ry="45.9785" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="137.6484" x="306.4747" y="290.5324">Write the failing test</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="130.5459" x="310.026" y="307.0207">from the diagrams,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="75.1953" x="337.7012" y="323.509">record RED</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="80.6504" x="334.9737" y="339.9973">(/mdd-test)</text></g><!--entity Gate--><g class="entity" data-qualified-name="TDD cycle.Gate" data-source-line="21" id="ent0005"><ellipse cx="877.7266" cy="305.109" fill="#F1F1F1" rx="91.9466" ry="33.5307" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="92.0664" x="831.6934" y="291.9733">Close only on</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="144.1084" x="805.6724" y="308.4616">red-&gt;green evidence</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="114.6729" x="820.3902" y="324.9499">(non-negotiable)</text></g><!--entity Discover--><g class="entity" data-qualified-name="TDD cycle.Discover" data-source-line="22" id="ent0006"><ellipse cx="375.297" cy="411.1035" fill="#F1F1F1" rx="99.617" ry="25.4552" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="141.8867" x="304.3536" y="408.848">Map discovers native</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="118.5488" x="316.0226" y="425.3363">tests (brownfield)</text></g><!--entity Accept--><g class="entity" data-qualified-name="TDD cycle.Accept" data-source-line="23" id="ent0007"><ellipse cx="375.301" cy="195.1085" fill="#F1F1F1" rx="131.001" ry="28.6002" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="200.5869" x="275.0076" y="192.1902">Acceptance = Playwright e2e;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="190.7842" x="279.9089" y="208.6785">docs derived from diagrams</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="17" id="ent0002"><ellipse cx="68.3164" cy="345.3583" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M68.3164,353.3583 L68.3164,380.3583 M55.3164,361.3583 L81.3164,361.3583 M68.3164,380.3583 L55.3164,395.3583 M68.3164,380.3583 L81.3164,395.3583" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="124.6328" x="6" y="410.3934">Developer / Agent</text></g><g class="entity" data-qualified-name="GMN13" data-source-line="34" id="ent0014"><path d="M690.96,43.4883 L690.96,114.7305 A0,0 0 0 0 690.96,114.7305 L873.73,114.7305 L877.73,271.1183 L881.73,114.7305 L1064.4961,114.7305 A0,0 0 0 0 1064.4961,114.7305 L1064.4961,53.4883 L1054.4961,43.4883 L690.96,43.4883 A0,0 0 0 0 690.96,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1054.4961,43.4883 L1054.4961,53.4883 L1064.4961,53.4883 L1054.4961,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="352.5361" x="696.96" y="61.0566">USE-TEST-RED-GREEN-GATE: every gap @id must show</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="305.7412" x="696.96" y="76.3672">fail-then-pass in test-evidence.yml to close. NO</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="312.1079" x="696.96" y="91.6777">off-switch. Empty gap set (refactor) closes on the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="109.9414" x="696.96" y="106.9883">green gate alone.</text></g><g class="entity" data-qualified-name="GMN16" data-source-line="41" id="ent0017"><path d="M191.63,59.1383 L191.63,115.0699 A0,0 0 0 0 191.63,115.0699 L371.3,115.0699 L375.3,166.4183 L379.3,115.0699 L558.9581,115.0699 A0,0 0 0 0 558.9581,115.0699 L558.9581,69.1383 L548.9581,59.1383 L191.63,59.1383 A0,0 0 0 0 191.63,59.1383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M548.9581,59.1383 L548.9581,69.1383 L558.9581,69.1383 L548.9581,59.1383" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><tex