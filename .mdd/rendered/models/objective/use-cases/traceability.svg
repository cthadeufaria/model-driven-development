<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="550px" preserveAspectRatio="none" style="width:1101px;height:550px;background:#FFFFFF;" version="1.1" viewBox="0 0 1101 550" width="1101px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="11"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="384.6582" x="354.8837" y="23.5352">MDD traceability + freshness &#8212; use cases (objective)</text></g><!--cluster mdd toolchain--><g class="cluster" data-qualified-name="mdd toolchain" data-source-line="17" id="ent0003"><rect fill="none" height="212" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="784.12" x="263.91" y="283.1083"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="103.4756" x="604.2322" y="298.6434">mdd toolchain</text></g><!--entity TraceParity--><g class="entity" data-qualified-name="mdd toolchain.TraceParity" data-source-line="18" id="ent0004"><ellipse cx="400.6776" cy="345.1118" fill="#F1F1F1" rx="120.7676" ry="26.5535" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="153.9043" x="323.7254" y="340.2703">Gate code&lt;-&gt;diagram</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="180.373" x="310.491" y="356.7585">traceability (review pass 3)</text></g><!--entity Freshness--><g class="entity" data-qualified-name="mdd toolchain.Freshness" data-source-line="19" id="ent0005"><ellipse cx="400.6787" cy="443.1103" fill="#F1F1F1" rx="115.1887" ry="36.012" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="168.1025" x="316.6275" y="434.2331">Check whether diagrams</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="155.2646" x="323.0464" y="450.7214">have drifted from code</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="123.1084" x="339.1245" y="467.2096">(mdd map-status)</text></g><!--entity VerifyLink--><g class="entity" data-qualified-name="mdd toolchain.VerifyLink" data-source-line="20" id="ent0006"><ellipse cx="908.5795" cy="395.1082" fill="#F1F1F1" rx="123.4495" ry="27.0899" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="180.6328" x="818.2631" y="392.1578">Verify source_links resolve</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="170.3037" x="823.4276" y="408.6461">to real symbols (validate)</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="15" id="ent0002"><ellipse cx="68.3164" cy="413.3683" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M68.3164,421.3683 L68.3164,448.3683 M55.3164,429.3683 L81.3164,429.3683 M68.3164,448.3683 L55.3164,463.3683 M68.3164,448.3683 L81.3164,463.3683" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="124.6328" x="6" y="478.4034">Developer / Agent</text></g><g class="entity" data-qualified-name="GMN12" data-source-line="31" id="ent0013"><path d="M191.63,149.5183 L191.63,266.6921 A0,0 0 0 0 191.63,266.6921 L396.68,266.6921 L400.68,318.0883 L404.68,266.6921 L609.7203,266.6921 A0,0 0 0 0 609.7203,266.6921 L609.7203,159.5183 L599.7203,149.5183 L191.63,149.5183 A0,0 0 0 0 191.63,149.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M599.7203,149.5183 L599.7203,159.5183 L609.7203,159.5183 L599.7203,149.5183" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="293.6616" x="197.63" y="167.0866">Objective (USE-TRACE-PARITY): a third pass in</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272.4795" x="197.63" y="182.3972">Project::review() after ID parity and security</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="340.2598" x="197.63" y="197.7077">parity. FORWARD = every implementable @id resolves</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="300.8726" x="197.63" y="213.0183">to a real symbol (error). REVERSE (scoped to the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="325.1206" x="197.63" y="228.3288">diff since base_revision) = every changed symbol is</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="287.46" x="197.63" y="243.6394">covered; glue warns (A), behaviour blocks (B).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="397.0903" x="197.63" y="258.9499">Realized by SEQ-TRACE-REVIEW; owned by CMP-TRACE-GATE.</text></g><g class="entity" data-qualified-name="GMN15" data-source-line="41" id="ent0016"><path d="M207.82,43.4883 L207.82,114.7305 L593.5373,114.7305 L593.5373,53.4883 L583.5373,43.4883 L207.82,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M583.5373,43.4883 L583.5373,53.4883 L593.5373,53.4883 L583.5373,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="336.248" x="213.82" y="61.0566">Objective (USE-MAP-FRESHNESS): `mdd map-status`</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="336.229" x="213.82" y="76.3672">reuses the same git + syn engine. fresh = no tracked</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="323.6543" x="213.82" y="91.6777">symbol changed since source_revision; stale = lists</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="364.7173" x="213.82" y="106.9883">the drifted (path, symbol). Realized by SEQ-MAP-STATUS.</text></g><g class="entity" data-qualified-name="GMN18" data-source-line="48" id="ent0019"><path d="M730.72,180.8283 L730.72,267.381 A0,0 0 0 0 730.72,267.381 L904.58,267.381 L908.58,367.7183 L912.58,267.381 L1086.4256,267.381 A0,0 0 0 0 1086.4256,267.381 L1086.4256,190.8283 L1076.4256,180.8283 L730.72,180.8283 A0,0 0 0 0 730.72,180.8283" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1076.4256,180.8283 L1076.4256,190.8283 L1086.4256,190.8283 L1076.4256,180.8283" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="334.7056" x="736.72" y="198.3966">Objective (USE-VERIFY-SOURCE-LINK): validate_inner</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="333.2266" x="736.72" y="213.7072">resolves each source_link (path exists; symbol found</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272.4224" x="736.72" y="229.0177">by syn). Dangling link -&gt; error. Honors the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="321.1152" x="736.72" y="244.3283">/mdd-validate checklist item 5 that was previously</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.6948" x="736.72" y="259.6388">documented but unenforced.</text></g><!--link Dev to TraceParity--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="23" id="lnk7"><path d="M130.89,412.9483 C150.03,404.3883 171.42,395.6283 191.63,389.1083 C227.47,377.5483 261.8948,369.3864 297.4148,362.3364" fill="none" id="Dev-to-TraceParity" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="303.3,361.1683,293.6935,358.997,298.3957,362.1417,295.2509,366.8439,303.3,361.1683" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to Freshness--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="24" id="lnk8"><path d="M131.07,443.1083 C174.3,443.1083 227.35,443.1083 279.08,443.1083" fill="none" id="Dev-to-Freshness" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="285.08,443.1083,276.08,439.1083,280.08,443.1083,276.08,447.1083,285.08,443.1083" style="stroke:#181818;stroke-width:1;"/></g><!--link Dev to VerifyLink--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="25" id="lnk9"><path d="M131.12,476.3383 C150,484.8483 171.19,492.7983 191.63,497.1083 C373.45,535.4583 426.43,527.6283 609.72,497.1083 C697.88,482.4383 789.4081,447.2687 848.0281,422.0587" fill="none" id="Dev-to-VerifyLink" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="853.54,419.6883,843.6919,419.5693,848.9468,421.6636,846.8524,426.9185,853.54,419.6883" style="stroke:#181818;stroke-width:1;"/></g><!--link TraceParity to VerifyLink--><g class="link" data-entity-1="ent0004" data-entity-2="ent0006" data-link-type="dependency" data-source-line="27" id="lnk10"><path d="M511.45,355.9583 C595.43,364.2583 704.8491,375.068 789.4191,383.428" fill="none" id="TraceParity-to-VerifyLink" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#181818" points="795.39,384.0183,786.8271,379.1523,790.4143,383.5264,786.0402,387.1135,795.39,384.0183" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" len