<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="343px" preserveAspectRatio="none" style="width:996px;height:343px;background:#FFFFFF;" version="1.1" viewBox="0 0 996 343" width="996px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="37"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="433.7881" x="277.8107" y="23.5352">MDD validate CLI &#8212; deterministic structural gate (objective)</text></g><!--cluster mdd toolchain--><g class="cluster" data-qualified-name="mdd toolchain" data-source-line="43" id="ent0003"><rect fill="none" height="121" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="704.07" x="241.14" y="145.7583"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="103.4756" x="541.4372" y="161.2934">mdd toolchain</text></g><!--entity ValidateCli--><g class="entity" data-qualified-name="mdd toolchain.ValidateCli" data-source-line="44" id="ent0004"><ellipse cx="362.3983" cy="215.7582" fill="#F1F1F1" rx="105.2683" ry="35.3999" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="156.1328" x="284.3319" y="207.8166">Run the structural gate</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="84.3145" x="320.241" y="224.3049">from the CLI</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="96.8789" x="313.9588" y="240.7931">(mdd validate)</text></g><!--entity ValidateJson--><g class="entity" data-qualified-name="mdd toolchain.ValidateJson" data-source-line="45" id="ent0005"><ellipse cx="816.7931" cy="215.7629" fill="#F1F1F1" rx="112.4231" ry="24.8846" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="170.29" x="731.6481" y="215.0053">Emit a machine-readable</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="104.46" x="764.5632" y="231.4936">verdict (--json)</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="41" id="ent0002"><ellipse cx="68.3164" cy="262.2566" fill="#90EE90" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M68.3164,270.2566 L68.3164,297.2566 M55.3164,278.2566 L81.3164,278.2566 M68.3164,297.2566 L55.3164,312.2566 M68.3164,297.2566 L81.3164,312.2566" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="124.6328" x="6" y="327.2917">Developer / Agent</text><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="67.5254" x="34.5537" y="250.8034">&#171;missing&#187;</text></g><g class="entity" data-qualified-name="GMN9" data-source-line="54" id="ent0010"><path d="M191.63,43.4883 L191.63,130.041 A0,0 0 0 0 191.63,130.041 L358.4,130.041 L362.4,179.9783 L366.4,130.041 L533.1739,130.041 A0,0 0 0 0 533.1739,130.041 L533.1739,53.4883 L523.1739,43.4883 L191.63,43.4883 A0,0 0 0 0 191.63,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M523.1739,43.4883 L523.1739,53.4883 L533.1739,53.4883 L523.1739,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.8555" x="197.63" y="61.0566">Objective (USE-VALIDATE-CLI): `mdd validate` -&gt;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="291.6367" x="197.63" y="76.3672">Project::validate() over both sides. Exit 0 when</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="320.4106" x="197.63" y="91.6777">report.ok, non-zero on a blocking structural error.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="320.5439" x="197.63" y="106.9883">Warnings (approvals, tests, SVGs) never affect exit.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="288.1392" x="197.63" y="122.2988">Independent of `mdd review` &#8212; no chaining.</text></g><g class="entity" data-qualified-name="GMN12" data-source-line="62" id="ent0013"><path d="M652.18,73.7983 L652.18,129.7299 A0,0 0 0 0 652.18,129.7299 L812.79,129.7299 L816.79,190.3783 L820.79,129.7299 L981.4095,129.7299 A0,0 0 0 0 981.4095,129.7299 L981.4095,83.7983 L971.4095,73.7983 L652.18,73.7983 A0,0 0 0 0 652.18,73.7983" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M971.4095,73.7983 L971.4095,83.7983 L981.4095,83.7983 L971.4095,73.7983" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="306.8521" x="658.18" y="91.3666">--json prints a slim {ok, errors, warnings} object</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="298.7397" x="658.18" y="106.6772">(not the full registry) so the /mdd-validate skill</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="308.2295" x="658.18" y="121.9877">parses a stable contract instead of scraping text.</text></g><!--link Dev to ValidateCli--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="48" id="lnk6"><path d="M130.9,269.4183 C172.75,259.6783 222.8364,248.0191 269.1264,237.2391" fill="none" id="Dev-to-ValidateCli" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="274.97,235.8783,265.2973,234.0238,270.1003,237.0123,267.1118,241.8153,274.97,