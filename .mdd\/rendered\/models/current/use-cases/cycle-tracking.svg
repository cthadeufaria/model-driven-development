<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="619px" preserveAspectRatio="none" style="width:1287px;height:619px;background:#FFFFFF;" version="1.1" viewBox="0 0 1287 619" width="1287px" zoomAndPan="magnify"><?plantuml 1.2026.3?><defs/><g><g class="title" data-source-line="20"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="299.8311" x="490.3484" y="23.5352">MDD cycle tracking &#8212; use cases (current)</text></g><!--cluster mdd toolchain + viewer--><g class="cluster" data-qualified-name="mdd toolchain . viewer" data-source-line="26" id="ent0003"><rect fill="none" height="194" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:1;" width="1113.03" x="146.09" y="358.7383"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="171.5479" x="616.8311" y="374.2734">mdd toolchain + viewer</text></g><!--entity RunCycle--><g class="entity" data-qualified-name="mdd toolchain . viewer.RunCycle" data-source-line="27" id="ent0004"><ellipse cx="283.728" cy="419.7381" fill="#F1F1F1" rx="103.388" ry="26.2198" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="140.1436" x="213.6562" y="416.0989">Run a full MDD cycle</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="142.5703" x="212.4428" y="432.5872">from one description</text></g><!--entity Tree--><g class="entity" data-qualified-name="mdd toolchain . viewer.Tree" data-source-line="28" id="ent0005"><ellipse cx="712.7794" cy="509.7422" fill="#F1F1F1" rx="121.4194" ry="26.6839" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="131.3252" x="647.1168" y="503.021">Browse models in a</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="196.1914" x="614.6837" y="519.5093">directory tree (VSCode-style)</text></g><!--entity Group--><g class="entity" data-qualified-name="mdd toolchain . viewer.Group" data-source-line="29" id="ent0006"><ellipse cx="1131.9714" cy="425.7386" fill="#F1F1F1" rx="96.5014" ry="21.7003" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="167.8496" x="1048.0466" y="430.4827">Group diagrams by cycle</text></g><!--entity Diff--><g class="entity" data-qualified-name="mdd toolchain . viewer.Diff" data-source-line="30" id="ent0007"><ellipse cx="283.7264" cy="507.7356" fill="#F1F1F1" rx="121.6364" ry="26.7273" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="153.9863" x="206.7332" y="502.6721">View the selected file's</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="184.4541" x="191.4993" y="519.1604">before/after diff for a cycle</text></g><!--entity DiffDiagram--><g class="entity" data-qualified-name="mdd toolchain . viewer.DiffDiagram" data-source-line="31" id="ent0008"><ellipse cx="712.7816" cy="420.7366" fill="#F1F1F1" rx="124.8416" ry="27.3683" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.8545" x="638.8544" y="414.3547">Toggle diff between a</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="202.1592" x="611.7021" y="430.8429">rendered diagram and the list</text></g><!--entity Desc--><g class="entity" data-qualified-name="mdd toolchain . viewer.Desc" data-source-line="32" id="ent0009"><ellipse cx="1131.9718" cy="506.7366" fill="#F1F1F1" rx="111.1418" ry="24.6284" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="174.8496" x="1044.547" y="506.9946">Read a diagram element's</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="76.0771" x="1093.9332" y="523.4828">description</text></g><!--entity Dev--><g class="entity" data-qualified-name="Dev" data-source-line="24" id="ent0002"><ellipse cx="40.1592" cy="537.9883" fill="#F1F1F1" rx="8" ry="8" style="stroke:#181818;stroke-width:0.5;"/><path d="M40.1592,545.9883 L40.1592,572.9883 M27.1592,553.9883 L53.1592,553.9883 M40.1592,572.9883 L27.1592,587.9883 M40.1592,572.9883 L53.1592,587.9883" fill="none" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="68.3184" x="6" y="603.0234">Developer</text></g><g class="entity" data-qualified-name="GMN18" data-source-line="46" id="ent0019"><path d="M557.39,43.4883 L557.39,175.9727 L868.1732,175.9727 L868.1732,53.4883 L858.1732,43.4883 L557.39,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M858.1732,43.4883 L858.1732,53.4883 L868.1732,53.4883 L858.1732,43.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="266.9316" x="563.39" y="61.0566">Code: the /mdd-cycle skill is registered in</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="289.7832" x="563.39" y="76.3672">templates::WORKFLOW_SKILLS and shipped as</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="251.564" x="563.39" y="91.6777">SKILL.md to .claude/ and .codex/. Entry</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="260.6157" x="563.39" y="106.9883">selection, cycle-boundary ownership, the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="273.7109" x="563.39" y="122.2988">parity loop, and the mandatory clarification</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="279.9126" x="563.39" y="137.6094">pause are documented there. The close step</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="223.4121" x="563.39" y="152.9199">also rasterizes the cycle diff pumls.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="186.437" x="563.39" y="168.2305">Realized by SEQ-RUN-CYCLE.</text></g><g class="entity" data-qualified-name="GMN21" data-source-line="57" id="ent0022"><path d="M135.32,210.4883 L135.32,342.9727 L432.1384,342.9727 L432.1384,220.4883 L422.1384,210.4883 L135.32,210.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M422.1384,210.4883 L422.1384,220.4883 L432.1384,220.4883 L422.1384,210.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="210.8628" x="141.32" y="228.0566">Code: MddViewer::diff_ui keys on</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.9854" x="141.32" y="243.3672">self.selected_file. The CYCLE row is built</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237.2881" x="141.32" y="258.6777">from Project::cycles_with_diff_for(file)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272.1875" x="141.32" y="273.9883">(newest first); selected_cycle is constrained</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="260.6602" x="141.32" y="289.2988">to that set and defaults to the latest. One</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="275.8184" x="141.32" y="304.6094">cycle -&gt; caption; none -&gt; "didn't change in</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220.1558" x="141.32" y="319.9199">any cycle" placeholder. Realized by</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="168.1875" x="141.32" y="335.2305">SEQ-RENDER-CYCLE-DIFF.</text></g><g class="entity" data-qualified-name="GMN24" data-source-line="68" id="ent0025"><path d="M553.14,210.4883 L553.14,342.9727 A0,0 0 0 0 553.14,342.9727 L708.78,342.9727 L712.78,392.8883 L716.78,342.9727 L872.4227,342.9727 A0,0 0 0 0 872.4227,342.9727 L872.4227,220.4883 L862.4227,210.4883 L553.14,210.4883 A0,0 0 0 0 553.14,210.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M862.4227,210.4883 L862.4227,220.4883 L872.4227,220.4883 L862.4227,210.4883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229.709" x="559.14" y="228.0566">Code: DiffSubMode toggle in diff_ui.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="259.7778" x="559.14" y="243.3672">Diagram resolves Cycle::diff_puml_rel -&gt;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.457" x="559.14" y="258.6777">Project::rendered_svg_path, loads it via</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="256.6294" x="559.14" y="273.9883">DiagramPage::load and paints it with the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="257.0039" x="559.14" y="289.2988">shared paint_canvas (pan/zoom reused);</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="218.7085" x="559.14" y="304.6094">List renders that one file's element</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="246.3589" x="559.14" y="319.9199">buckets. The .diff.svg is pre-rasterized</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="298.2827" x="559.14" y="335.2305">by render_cycle_diffs (SEQ-RENDER-DIFF-SVG).</text></g><g class="entity" data-qualified-name="GMN27" data-source-line="79" id="ent0028"><path d="M991.42,271.1083 L991.42,342.3505 L1272.5279,342.3505 L1272.5279,281.1083 L1262.5279,271.1083 L991.42,271.1083" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1262.5279,271.1083 L1262.5279,281.1083 L1272.5279,281.1083 L1262.5279,271.1083" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="231.918" x="997.42" y="288.6766">Code: @desc(&lt;ID&gt;, "text") parsed by</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="260.1079" x="997.42" y="303.9872">extract_descs into Project::descriptions();</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="201.5952" x="997.42" y="319.2977">shown on selection. Realized by</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="133.1738" x="997.42" y="334.6083">SEQ-ELEMENT-DESC.</text></g><!--link Dev to RunCycle--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="35" id="lnk10"><path d="M67.67,529.2283 C84.67,507.1783 108.53,480.6183 135.32,463.7383 C155.09,451.2683 172.8031,443.8788 195.1431,437.3188" fill="none" id="Dev-to-RunCycle" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="200.9,435.6283,191.1376,434.3261,196.1026,437.037,193.3916,442.002,200.9,435.6283" style="stroke:#181818;stroke-w